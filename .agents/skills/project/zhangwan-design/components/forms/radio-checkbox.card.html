<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<div id="root" style="padding:24px;font-family:var(--font-ui);background:var(--surface-card);display:flex;flex-direction:column;gap:18px;min-height:110px;"></div>
<script type="text/babel">
const { RadioButtonGroup, Checkbox } = window.CompassDesignSystem_6dfef5;
function Demo() {
  const [g, setG] = React.useState('day');
  const [c1, setC1] = React.useState(true);
  const [c2, setC2] = React.useState(false);
  return (
    <>
      <RadioButtonGroup options={[{label:'按天',value:'day'},{label:'按周',value:'week'},{label:'按月',value:'month'}]} value={g} onChange={setG} />
      <div style={{display:'flex', gap:16}}>
        <Checkbox label="短剧信息" checked={c1} onChange={setC1} />
        <Checkbox label="合同剧名称" checked={c2} onChange={setC2} />
        <Checkbox label="已禁用" checked={false} disabled />
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
