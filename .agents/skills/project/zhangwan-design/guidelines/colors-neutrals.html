<!-- @dsCard group="Colors" viewport="700x150" name="中性色与文字" subtitle="文字层级 + 表面色" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);display:flex;height:150px;}
  .col{flex:1;padding:14px;}
  .txt{font-size:13px;margin:4px 0;}
</style>
<div class="col" style="background:var(--surface-canvas)">
  <div class="txt" style="color:var(--text-heading)">■ text-heading #323335</div>
  <div class="txt" style="color:var(--text-body)">■ text-body #606266</div>
  <div class="txt" style="color:var(--text-muted)">■ text-muted #4e5969</div>
  <div class="txt" style="color:var(--text-faint)">■ text-faint #8c8c8c</div>
</div>
<div class="col" style="background:var(--surface-card);border-left:1px solid var(--color-border-light)">
  <div class="txt">surface-card #ffffff</div>
  <div class="txt" style="background:var(--surface-sunken);padding:8px;border-radius:4px;">surface-sunken #f7f8fa</div>
  <div class="txt" style="background:var(--color-surface-muted);padding:8px;border-radius:4px;">surface-muted #f2f3f5</div>
</div>
