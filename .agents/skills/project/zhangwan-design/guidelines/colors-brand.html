<!-- @dsCard group="Colors" viewport="700x150" name="品牌与强调色" subtitle="主题绿 + 遗留蓝色强调" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);}
  .row{display:flex;gap:8px;padding:16px;}
  .sw{flex:1;height:100px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:11px;color:#fff;}
  .sw span{display:block;}
  .sw.dark{color:var(--color-text-primary);}
</style>
<div class="row">
  <div class="sw" style="background:var(--color-brand-green)"><span>--color-brand-green</span><span>#00bf8a</span></div>
  <div class="sw dark" style="background:var(--color-brand-green-bg);border:1px solid var(--color-brand-green-border)"><span>--color-brand-green-bg</span><span>#e4fef1</span></div>
  <div class="sw dark" style="background:var(--color-press-bg)"><span>--color-press-bg</span><span>#e1fff0</span></div>
  <div class="sw" style="background:var(--color-blue)"><span>--color-blue</span><span>#409eff</span></div>
  <div class="sw" style="background:var(--color-blue-dark)"><span>--color-blue-dark</span><span>#5b7df9</span></div>
  <div class="sw" style="background:var(--color-orange)"><span>--color-orange</span><span>#ff7d00</span></div>
</div>
