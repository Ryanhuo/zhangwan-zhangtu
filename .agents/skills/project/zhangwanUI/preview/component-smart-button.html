<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--color-surface);font:var(--type-body-md);color:var(--color-on-surface)}.specimen{display:grid;gap:8px}.story{display:grid;grid-template-columns:92px minmax(0,1fr);gap:var(--space-2);align-items:center}.story-label{font:var(--type-caption);color:var(--color-muted-foreground);text-transform:uppercase;letter-spacing:.08em}.rail{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center}.divider{margin:4px 0;border:0;border-top:1px solid var(--color-outline-variant)}/* @component-css-start */.smart-btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);height:var(--size-button-height);min-width:var(--size-button-height);padding:0 var(--space-4);border-radius:var(--radius-md);border:1px solid transparent;background:var(--color-surface);color:var(--color-on-surface);box-sizing:border-box;font:var(--type-body-md);font-weight:var(--font-weight-lead);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;flex-shrink:0;transition:background .15s,border-color .15s}.smart-btn:disabled{cursor:not-allowed;opacity:.48}.smart-btn--primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-2)}.smart-btn--primary:hover{background:var(--accent-hover)}.smart-btn--secondary{background:var(--color-surface);border-color:var(--color-border)}.smart-btn--secondary:hover{background:var(--interactive-hover)}.smart-btn--ghost{height:var(--size-control-sm);min-width:var(--size-control-sm);padding:0 var(--space-3);border-radius:var(--radius-sm);background:transparent}.smart-btn--ghost:hover{background:var(--interactive-hover)}/* @component-css-end */</style>
</head>
<body>
<div class="specimen">
<div class="story"><div class="story-label">default</div><div class="rail"><button class="smart-btn smart-btn--primary" type="button">智能创建</button><button class="smart-btn smart-btn--secondary" type="button">保存</button><button class="smart-btn smart-btn--ghost" type="button">收藏</button></div></div>
<div class="story"><div class="story-label">toolbar</div><div class="rail"><button class="smart-btn smart-btn--secondary" type="button">批量执行</button><button class="smart-btn smart-btn--ghost" type="button">筛选</button></div></div>
<hr class="divider">
<div class="story"><div class="story-label">disabled</div><div class="rail"><button class="smart-btn smart-btn--primary" type="button" disabled>智能创建</button><button class="smart-btn smart-btn--secondary" type="button" disabled>保存</button><button class="smart-btn smart-btn--ghost" type="button" disabled>收藏</button></div></div>
</div>
</body>
</html>
