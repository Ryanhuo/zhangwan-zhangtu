<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--color-background);font:var(--type-body-md);color:var(--color-on-surface)}.specimen,.story,.stage{display:grid;gap:var(--space-2)}.story-label{font:var(--type-caption);color:var(--color-on-surface-variant);text-transform:uppercase;letter-spacing:.08em}.divider{margin:var(--space-1) 0;border:0;border-top:1px solid var(--color-outline-variant)}/* @component-css-start */.shell{width:100%;overflow:hidden;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-1)}.toolbar,.pager{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);padding:var(--space-3) var(--space-4);background:var(--color-surface-container-low)}.rail{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}.pill,.btn{display:inline-flex;align-items:center;justify-content:center;height:var(--size-control-sm);min-width:var(--size-control-sm);padding:0 var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-on-surface);font:var(--type-body-sm);white-space:nowrap;transition:background .15s,border-color .15s}.btn:hover{background:var(--interactive-hover);border-color:var(--color-outline)}table{width:100%;border-collapse:collapse}th,td{height:44px;padding:0 var(--space-4);border-bottom:1px solid var(--color-outline-variant);white-space:nowrap}th{background:var(--color-surface-container-low);color:var(--color-on-surface-variant);font:var(--type-caption);text-align:left}th:last-child,td:last-child,th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}tr:hover td{filter:brightness(.97)}tbody tr:last-child td{border-bottom:0}.row-selected td{background:var(--color-primary-container)}.row-selected td:first-child{box-shadow:inset 2px 0 0 var(--color-primary)}.warning{color:var(--color-warning);font-weight:500}.status{display:inline-flex;align-items:center;height:22px;padding:0 var(--space-2);border-radius:var(--radius-full);background:var(--error-container);color:var(--color-error);font:var(--type-caption)}.pager{border-top:1px solid var(--color-outline-variant)}/* @component-css-end */</style>
</head>
<body>
<div class="specimen">
<section class="story" data-evidence-sample="compact-ops-table"><div class="story-label">compact · with-summary</div><div class="stage"><div class="shell"><div class="toolbar"><div class="rail"><span class="pill">ROI 12.4%</span><span class="pill">成本 2480</span><span class="pill">点击率 3.8%</span></div><button class="btn" type="button">with-column-settings</button></div><table><thead><tr><th>核心业务</th><th class="num">ROI</th><th class="num">成本</th><th class="num">点击率</th><th>rowState</th></tr></thead><tbody><tr><td>核心业务</td><td class="num">12.4%</td><td class="num">2480</td><td class="num">3.8%</td><td>default</td></tr><tr><td>横向滚动</td><td class="num">10.8%</td><td class="num">1960</td><td class="num">3.2%</td><td>default</td></tr><tr><td>自定义列</td><td class="num">9.7%</td><td class="num">1830</td><td class="num">2.9%</td><td>default</td></tr></tbody></table><div class="pager"><span class="pill">44px</span><div class="rail"><button class="btn" type="button" aria-label="上一页">‹</button><button class="btn" type="button" aria-label="下一页">›</button></div></div></div></div></section>
<hr class="divider">
<section class="story" data-evidence-sample="selected-row"><div class="story-label">selected · warning</div><div class="stage"><div class="shell"><table><thead><tr><th>核心业务</th><th class="num">ROI</th><th class="num">成本</th><th class="num">点击率</th><th>status-inline</th></tr></thead><tbody><tr class="row-selected"><td>compact</td><td class="num">14.2%</td><td class="num">2160</td><td class="num">4.1%</td><td>selected</td></tr><tr data-evidence-sample="warning-cell"><td>时区风险</td><td class="num">8.1%</td><td class="num warning">3920</td><td class="num">1.6%</td><td><span class="status">warning</span></td></tr></tbody></table></div></div></section>
</div>
</body>
</html>
