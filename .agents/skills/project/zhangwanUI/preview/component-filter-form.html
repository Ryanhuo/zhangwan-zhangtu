<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--color-background);font-family:var(--font-body);color:var(--color-on-surface)}.specimen,.stage{display:grid;gap:var(--space-3)}.story{display:grid;gap:var(--space-2)}.story-label{font:var(--type-caption);color:var(--color-on-surface-variant);letter-spacing:.08em;text-transform:uppercase}.divider{margin:0;border:0;border-top:1px solid var(--color-outline-variant)}/* @component-css-start */.filter-form{display:flex;flex-wrap:wrap;gap:var(--space-3);align-items:center;width:100%;padding:var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-card)}.field-group,.chip-group,.actions{display:flex;gap:var(--space-2);align-items:center;flex-wrap:wrap}.field-group{flex:1 1 0;min-width:0}.control{display:inline-flex;align-items:center;justify-content:space-between;gap:var(--space-2);height:var(--size-input-height);min-width:132px;padding:0 var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-on-surface);font:var(--type-body-md);white-space:nowrap}.control.input{min-width:180px;justify-content:flex-start;color:var(--color-on-surface-variant)}.control.range{min-width:196px}.chip{display:inline-flex;align-items:center;justify-content:center;height:var(--size-tag-height);min-width:var(--size-tag-height);padding:0 var(--space-3);border:1px solid var(--color-outline-variant);border-radius:var(--radius-full);background:var(--color-surface);color:var(--color-on-surface-variant);font:var(--type-body-sm);white-space:nowrap;transition:background .15s,border-color .15s}.chip:hover,.btn:hover{background:var(--interactive-hover)}.chip.active{border-color:var(--color-primary);background:var(--color-primary-container);color:var(--color-primary)}.actions{margin-left:auto;flex-shrink:0}.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);height:var(--size-input-height);min-width:64px;padding:0 var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-on-surface);font:var(--type-body-md);white-space:nowrap;transition:background .15s,border-color .15s}.btn.primary{border-color:var(--color-primary);background:var(--color-primary);color:var(--color-on-primary)}.btn.primary:hover{background:var(--color-primary-hover);border-color:var(--color-primary-hover)}.disabled .control,.disabled .btn{background:var(--color-surface-container);color:var(--color-on-surface-variant);border-color:var(--color-outline-variant)}.wrap .control{min-width:180px}/* @component-css-end */</style>
</head>
<body>
<div class="specimen"><div class="stage"><section class="story"><div class="story-label">紧凑筛选</div><form class="filter-form" data-evidence-sample="compact-inline"><div class="field-group"><div class="control">平台</div><div class="control input">账户</div><div class="control range">时间</div></div><div class="actions"><button class="btn primary" type="button">查询</button><button class="btn" type="button">重置</button></div></form><form class="filter-form disabled" aria-label="禁用筛选" data-evidence-sample="compact-inline"><div class="field-group"><div class="control">平台</div><div class="control input">账户</div><div class="control range">时间</div></div><div class="actions"><button class="btn primary" type="button" disabled>查询</button><button class="btn" type="button" disabled>重置</button></div></form></section><hr class="divider"><section class="story"><div class="story-label">状态与换行</div><form class="filter-form wrap" data-evidence-sample="wrap-mode"><div class="chip-group" data-evidence-sample="with-status-chip"><button class="chip active" type="button">状态</button><button class="chip" type="button">平台</button><button class="chip" type="button">账户</button></div><div class="field-group"><div class="control">平台</div><div class="control input">账户</div><div class="control range">时间</div><div class="control">状态</div></div><div class="actions"><button class="btn primary" type="button">查询</button><button class="btn" type="button">重置</button></div></form></section></div></div>
</body>
</html>
