<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body { margin: 0; padding: 12px; background: var(--color-surface-container-low); font: var(--type-body-md); color: var(--color-on-surface); }.specimen { display: flex; }.stage { display: flex; flex-direction: column; gap: var(--space-3); width: 100%; }.story { display: grid; grid-template-columns: 92px minmax(0,1fr); gap: var(--space-3); align-items: start; }.rail { display: flex; gap: var(--space-3); align-items: center; min-width: 0; }.rail.column { flex-direction: column; align-items: stretch; }.story-label { padding-top: var(--space-2); font: var(--type-caption); color: var(--color-on-surface-variant); letter-spacing: .08em; text-transform: uppercase; }.divider { width: 100%; height: 1px; margin: 0; border: 0; background: var(--color-outline-variant); }/* @component-css-start */.topnav { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); width: 100%; height: var(--nav-height); padding: 0 var(--space-4); background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); min-width: 0; }.topnav.platform { box-shadow: var(--shadow-1); }.topnav.scrolled { box-shadow: var(--shadow-2); }.group { display: inline-flex; align-items: center; gap: var(--space-2); min-width: 0; }.chip,.tab,.icon-btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); height: var(--size-button-height); min-width: var(--size-button-height); padding: 0 var(--space-3); border: 1px solid var(--color-border); border-radius: var(--radius-full); background: var(--color-surface); color: var(--color-on-surface); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; transition: background .15s,border-color .15s; flex-shrink: 0; }.chip:hover,.tab:hover,.icon-btn:hover { background: var(--interactive-hover); }.chip.primary,.tab.active { background: var(--color-primary-container); border-color: var(--color-primary-container); color: var(--color-primary); }.crumb { color: var(--color-on-surface-variant); text-decoration: none; white-space: nowrap; }.crumb:hover { color: var(--color-link); }.sep { color: var(--color-outline); }.tabs { display: inline-flex; align-items: center; gap: var(--space-2); min-width: 0; }.icon-btn { width: var(--size-button-height); padding: 0; border-radius: var(--radius-md); background: var(--color-surface-container); }.icon-btn::before { content: ""; width: var(--size-icon-md); height: var(--size-icon-md); border-radius: var(--radius-full); background: var(--color-on-surface-variant); opacity: .55; }.meta { color: var(--color-on-surface-variant); white-space: nowrap; }/* @component-css-end */</style>
</head>
<body>
<div class="specimen"><div class="stage">
<section class="story"><span class="story-label">平台切换</span><div class="rail"><nav class="topnav platform" aria-label="Top Navigation"><div class="group"><button class="chip primary" type="button">顶部平台选择</button><button class="chip" type="button">账户上下文切换</button></div><div class="group"><button class="icon-btn" type="button" aria-label="toolbar-actions"></button><button class="icon-btn" type="button" aria-label="toolbar-actions"></button></div></nav></div></section>
<hr class="divider">
<section class="story"><span class="story-label">路径与页签</span><div class="rail column"><nav class="topnav" aria-label="Top Navigation"><div class="group"><a class="crumb" href="#">路径说明</a><span class="sep">/</span><span class="meta">业务页签</span></div><div class="tabs"><button class="tab active" type="button">业务页签</button><button class="tab" type="button">上下文切换</button><button class="icon-btn" type="button" aria-label="secondary-actions"></button></div></nav><nav class="topnav scrolled" aria-label="Top Navigation"><div class="group"><span class="meta">页面滚动后</span><span class="sep">/</span><a class="crumb" href="#">路径说明</a></div><div class="tabs"><button class="tab active" type="button">业务页签</button><button class="tab" type="button">上下文切换</button></div></nav></div></section>
</div></div>
</body>
</html>
