<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--color-surface-container);font:var(--type-body-md);color:var(--color-on-surface)}.specimen{display:flex;flex-direction:column;gap:var(--space-3)}.story{display:flex;align-items:flex-start;gap:var(--space-3)}.story-label{width:92px;flex-shrink:0;padding-top:var(--space-2);font:var(--type-caption);letter-spacing:.08em;text-transform:uppercase;color:var(--color-muted-foreground)}.rail{display:flex;gap:var(--space-3);flex-wrap:wrap;flex:1}.divider{margin:0;border:0;border-top:1px solid var(--color-border)}/* @component-css-start */.sidebar{width:var(--sidebar-width);display:flex;flex-direction:column;gap:var(--space-2);padding:var(--space-3);background:var(--color-sidebar);border:1px solid var(--color-border)}.brand{height:var(--nav-height);display:flex;align-items:center;padding:0 var(--space-2);font:var(--type-body-lg);font-weight:var(--font-weight-h4)}.group{padding:0 var(--space-2);font:var(--type-caption);letter-spacing:.08em;text-transform:uppercase;color:var(--color-on-surface-variant)}.nav{display:flex;flex-direction:column;gap:var(--space-1)}.item{height:var(--size-control-md);min-width:var(--size-control-md);display:flex;align-items:center;gap:var(--space-2);padding:0 var(--space-2);border-radius:var(--radius-md);color:var(--color-on-surface);text-decoration:none;white-space:nowrap;transition:background .15s,border-color .15s}.item:hover{background:var(--interactive-hover)}.item.active{background:var(--color-primary-container);color:var(--color-primary);font-weight:var(--font-weight-h4)}.item.favorite{color:var(--color-on-surface-variant)}.item.disabled{opacity:.48;pointer-events:none}.slot{width:var(--size-icon-md);height:var(--size-icon-md);flex-shrink:0;border-radius:var(--radius-xs);background:currentColor;opacity:.18}.footer{margin-top:auto;padding-top:var(--space-2);border-top:1px solid var(--color-border);display:flex;flex-direction:column;gap:var(--space-1)}.collapsed{width:var(--sidebar-collapsed-width);padding:var(--space-3) var(--space-2)}.collapsed .brand,.collapsed .group,.collapsed .text{display:none}.collapsed .item,.collapsed .footer .item{justify-content:center;padding:0}.collapsed .nav{align-items:center}/* @component-css-end */</style>
</head>
<body>
<div class="specimen">
  <div class="story"><div class="story-label">默认</div><div class="rail"><nav class="sidebar" aria-label="Sidebar Navigation" data-evidence-sample="default-expanded"><div class="brand">zhangwanUI</div><div class="group">主分组</div><div class="nav"><a class="item" href="#"><span class="slot" aria-hidden="true"></span><span class="text">后台主导航</span></a><a class="item active" href="#" data-evidence-sample="active-item"><span class="slot" aria-hidden="true"></span><span class="text">当前导航</span></a><a class="item favorite" href="#" data-evidence-sample="favorite-item"><span class="slot" aria-hidden="true"></span><span class="text">收藏入口</span></a></div><div class="footer"><a class="item" href="#"><span class="slot" aria-hidden="true"></span><span class="text">快捷入口</span></a><a class="item disabled" aria-disabled="true"><span class="slot" aria-hidden="true"></span><span class="text">页脚工具</span></a></div></nav></div></div>
  <hr class="divider">
  <div class="story"><div class="story-label">折叠预览</div><div class="rail"><nav class="sidebar collapsed" aria-label="Sidebar Navigation" data-evidence-sample="default-expanded"><div class="brand">zhangwanUI</div><div class="group">主分组</div><div class="nav"><a class="item active" href="#" aria-label="当前导航"><span class="slot" aria-hidden="true"></span><span class="text">当前导航</span></a><a class="item" href="#" aria-label="收藏入口"><span class="slot" aria-hidden="true"></span><span class="text">收藏入口</span></a></div><div class="footer"><a class="item" href="#" aria-label="页脚工具"><span class="slot" aria-hidden="true"></span><span class="text">页脚工具</span></a></div></nav></div></div>
</div>
</body>
</html>
