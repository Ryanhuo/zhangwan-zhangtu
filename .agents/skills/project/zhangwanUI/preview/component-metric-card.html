<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Metric Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:12px;background:var(--color-background);font:var(--type-body-md);color:var(--color-on-surface)}.specimen{display:flex;flex-direction:column;gap:var(--space-3)}.story{display:flex;flex-direction:column;gap:var(--space-2)}.rail{display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:stretch}.story-label{font:var(--type-caption);color:var(--color-on-surface-variant);letter-spacing:.08em;text-transform:uppercase}/* @component-css-start */.metric-card{width:208px;min-height:132px;padding:var(--space-5);border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-card);box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:var(--space-3)}.metric-card__top,.metric-card__meta{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2)}.metric-card__label{font:var(--type-caption);color:var(--color-on-surface-variant);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.metric-card__value{font:var(--type-heading-lg);color:var(--color-on-surface);word-break:keep-all}.metric-card__meta{margin-top:auto}.metric-card__note{font:var(--type-body-sm);color:var(--color-on-surface-variant);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.metric-card__pill{height:var(--size-tag-height);min-width:var(--size-tag-height);padding:0 var(--space-2);border-radius:var(--radius-full);display:inline-flex;align-items:center;justify-content:center;font:var(--type-caption);white-space:nowrap}.metric-card--positive .metric-card__pill{background:var(--color-primary-container);color:var(--color-success)}.metric-card--warning .metric-card__pill{background:var(--color-surface-container-low);color:var(--color-warning)}/* @component-css-end */</style>
</head>
<body>
<main class="specimen">
<section class="story" aria-label="Metric Card">
<div class="story-label">投放概览首屏</div>
<div class="rail">
<article class="metric-card">
<div class="metric-card__top"><span class="metric-card__label">服务花费</span></div>
<strong class="metric-card__value">ROI</strong>
<div class="metric-card__meta"><span class="metric-card__note">点击</span><span class="metric-card__note">转化</span></div>
</article>
<article class="metric-card metric-card--positive">
<div class="metric-card__top"><span class="metric-card__label">ROI 改善</span><span class="metric-card__pill">positive</span></div>
<strong class="metric-card__value">转化提升</strong>
<div class="metric-card__meta"><span class="metric-card__note">comparison</span></div>
</article>
<article class="metric-card metric-card--warning">
<div class="metric-card__top"><span class="metric-card__label">成本升高</span><span class="metric-card__pill">warning</span></div>
<strong class="metric-card__value">预算预警</strong>
<div class="metric-card__meta"><span class="metric-card__note">status</span></div>
</article>
</div>
</section>
</main>
</body>
</html>
