    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--background);
      color: var(--color-on-surface);
      font: var(--type-body-md);
      font-family: var(--font-body);
    }
    button, input, select { font: inherit; }

    }
    .uikit-page {
      min-height: 100vh;
      padding: var(--space-4);
      background: var(--background);
    }
    .uikit-shell {
      width: 100%;
      max-width: 1184px;
      margin: 0 auto;
      overflow: hidden;
      display: grid;
      grid-template-columns: var(--uikit-sidebar-w, 220px) minmax(0, 1fr);
      gap: var(--space-4);
      min-height: calc(100vh - var(--space-8));
    }
    .uikit-sidebar, .uikit-main, .uikit-toolbar { min-width: 0; }
    .uikit-sidebar {
      overflow: hidden;
      max-width: 100%;
      position: sticky;
      top: var(--space-4);
      align-self: start;
    }
    [data-component] { min-width: 0; max-width: 100%; overflow: hidden; }
    .uikit-main {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .uikit-toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .uikit-top-stack {
      position: sticky;
      top: var(--space-4);
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .uikit-workspace {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      min-width: 0;
    }
    .uikit-stage {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-card);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      min-width: 0;
    }
    .uikit-heading {
      margin: 0;
      font: var(--type-heading-md);
      font-family: var(--font-heading);
      color: var(--color-on-surface);
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: balance;
    }
    .uikit-subheading {
      margin: 0;
      color: var(--color-on-surface-variant);
      font: var(--type-body-md);
    }
    .uikit-brief {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
      padding: 0 var(--space-3);
      height: var(--size-control-sm);
      border-radius: var(--radius-md);
      background: var(--zhangwan-info-50);
      color: var(--color-info);
      font: var(--type-body-sm);
      white-space: nowrap;
    }
    .uikit-breadcrumb-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      min-width: 0;
      padding: 0 var(--space-1);
    }
    .uikit-breadcrumb-left,
    .uikit-breadcrumb-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
    }
    .uikit-tab-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      min-width: 0;
      padding: var(--space-2) var(--space-1) 0;
      border-top: 1px solid var(--color-outline-variant);
    }
    .uikit-tab-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
      flex-wrap: wrap;
    }
    .uikit-tab-note {
      color: var(--color-on-surface-variant);
      font: var(--type-caption);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .uikit-responsive-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-4);
    }
    .uikit-metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-4);
      min-width: 0;
    }
    .uikit-table-wrap {
      max-width: 100%;
      overflow-x: auto;
      overscroll-behavior-x: contain;
    }
    .uikit-table-min { min-width: 1080px; }
    .uikit-truncate {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .uikit-nowrap { white-space: nowrap; flex-shrink: 0; }
    .uikit-action-cell {

      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: 160px;
      overflow: hidden;
      justify-content: flex-end;

    .uikit-action {

    .uikit-side-label {

      text-overflow: ellipsis;
      white-space: nowrap;

    .uikit-item-badge {

      height: var(--size-tag-height);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      background: var(--color-surface-container-low);
      color: var(--color-on-surface-variant);
      font: var(--type-caption);
      white-space: nowrap;

      gap: var(--space-2);

    .uikit-filter-card {

      flex-direction: column;
      gap: var(--space-3);
      min-width: 0;

    .uikit-control-text,
    .uikit-cell-stack,
    .uikit-cell-sub {

      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

    .uikit-cell-stack {

      flex-direction: column;
      gap: var(--space-1);

    .uikit-cell-sub {
      color: var(--color-on-surface-variant);
      font: var(--type-caption);
    }
    .uikit-mono {
      font: var(--type-mono);

    .uikit-empty-icon-btn {
      background: var(--color-surface-container);
      border-color: var(--color-border);
    }

      from { opacity: 0; transform: translateY(var(--space-2)); }
      to { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      .uikit-shell { grid-template-columns: minmax(0, 1fr); }
      .uikit-responsive-grid,
      .uikit-metric-grid { grid-template-columns: minmax(0, 1fr); }
      .uikit-sidebar { position: static; }
      .uikit-top-stack { position: static; }
    }
    @media (max-width: 640px) {
      .uikit-toolbar { flex-direction: column; align-items: stretch; }
      .uikit-responsive-grid,
      .uikit-metric-grid { grid-template-columns: minmax(0, 1fr); }
      .uikit-page { padding: var(--space-3); }
      .uikit-stage { padding: var(--space-4); }
      .uikit-breadcrumb-row,
      .uikit-tab-strip,
      .uikit-view-header { flex-direction: column; align-items: stretch; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

            <div className="footer">
              <a href="#" className="item">
                <span className="uikit-side-icon" aria-hidden="true">
                  <i data-lucide="settings" style={{ width: "16px", height: "16px", display: "inline-block" }}></i>
                </span>
                <span className="uikit-side-label">账户设置</span>
              </a>
              <a href="#" className="item">
                <span className="uikit-side-icon" aria-hidden="true">
                  <i data-lucide="history" style={{ width: "16px", height: "16px", display: "inline-block" }}></i>
                </span>
                <span className="uikit-side-label">操作日志</span>
              </a>
            </div>
          </nav>
        </div>
      );
    }

    function TopNavigation({ activeView, onNavigate, current }) {
      const tabs = [
        { key: "overview", label: "总览" },
        { key: "campaigns", label: "计划" },
        { key: "diagnostics", label: "诊断" }
      ];

      return (
        <div data-component="top-navigation" className="uikit-stage">
          <nav className="topnav platform" aria-label="Top Navigation">
            <div className="group uikit-truncate">
              <button className="chip" type="button">巨量引擎</button>
              <button className="chip" type="button">华东一区</button>
              <span className="meta uikit-truncate">账户：春季拉新 / 线索收集</span>
            </div>
            <div className="group">
              <button className="icon-btn" type="button" aria-label="通知">
                <i data-lucide="bell" style={{ width: "16px", height: "16px", display: "inline-block" }}></i>
              </button>
              <button className="icon-btn" type="button" aria-label="搜索">
                <i data-lucide="search" style={{ width: "16px", height: "16px", display: "inline-block" }}></i>
              </button>
              <button className="icon-btn" type="button" aria-label="筛选模板">
                <i data-lucide="sliders-horizontal" style={{ width: "16px", height: "16px", display: "inline-block" }}></i>
              </button>
            </div>
          </nav>
          <div className="uikit-breadcrumb-row">
            <div className="uikit-breadcrumb-left">
              <a href="#" className="crumb">工作台</a>
              <span className="sep">/</span>
              <a href="#" className="crumb">{current.breadcrumb[0]}</a>
              <span className="sep">/</span>
              <span className="meta">{current.breadcrumb[1]}</span>
            </div>
            <div className="uikit-breadcrumb-right">
              <button type="button" className="smart-btn smart-btn--secondary" disabled>同步报表</button>
              <button type="button" className="smart-btn smart-btn--primary">智能创建</button>
            </div>
          </div>
          <div className="uikit-tab-strip">
            <div className="tabs">
              {tabs.map((tab) => (
                <button
                  key={tab.key}
                  type="button"
                  className={`tab ${activeView === tab.key ? "active" : ""}`}
                  onClick={() => onNavigate(tab.key)}
                >
                  {tab.label}
                </button>
              ))}
            </div>
            <div className="uikit-tab-actions">
              <span className="uikit-tab-note">{current.updateText}</span>
              <button type="button" className="smart-btn smart-btn--ghost">批量调整</button>
            </div>
          </div>
        </div>
      );
    }

    function MetricGrid({ metrics }) {
      return (
        <div className="uikit-metric-grid">
          {metrics.map((metric) => (
            <article key={metric.label} data-component="metric-card" className={`metric-card ${metric.tone}`}>
              <div className="metric-card__top">
                <span className="metric-card__label uikit-truncate">{metric.label}</span>
                <span className="metric-card__pill">{metric.badge}</span>
              </div>
              <div className="metric-card__value">{metric.value}</div>
              <div className="metric-card__meta">
                <span className="metric-card__note uikit-truncate">{metric.note}</span>
                <span className="uikit-inline-icon" aria-hidden="true">
                  <i data-lucide="trending-up" style={{ width: "16px", height: "16px", display: "inline-block" }}></i>
                </span>
              </div>
            </article>
          ))}
        </div>
      );
    }

    function FilterPanel({ filters, pills }) {
      return (
        <div data-component="filter-form" className="uikit-filter-card">
          <div className="uikit-summary-row">
            <div className="uikit-view-stats">
              {pills.map((pill) => <StatusBadge key={pill.text} text={pill.text} tone={pill.tone} />)}
            </div>
            <span className="uikit-summary-note">筛选条件会影响当前表格与指标卡统计口径</span>
          </div>
          <form className="filter-form" aria-label="广告筛选栏">
            <div className="field-group">
              <div className="control"><span className="uikit-control-text">{filters[0]}</span><i data-lucide="chevron-down" style={{ width: "14px", height: "14px", display: "inline-block" }}></i></div>
              <div className="control input"><span className="uikit-control-text">{filters[1]}</span></div>
              <div className="control range"><span className="uikit-control-text">{filters[2]}</span><i data-lucide="calendar" style={{ width: "14px", height: "14px", display: "inline-block" }}></i></div>
              <div className="control"><span className="uikit-control-text">{filters[3]}</span><i data-lucide="chevron-down" style={{ width: "14px", height: "14px", display: "inline-block" }}></i></div>
            </div>
            <div className="actions">
              <button className="btn" type="button">筛选</button>
              <button className="btn" type="button">重置</button>
            </div>
          </form>
        </div>
      );
    }

    function DataTable({ rows, summaryLabel }) {
      return (
        <div data-component="data-table" className="uikit-table-wrap">
          <div className="uikit-table-min">
            <div className="shell">
              <div className="toolbar">
                <div className="rail">
                  <span className="pill">{summaryLabel[0]}</span>
                  <span className="pill">{summaryLabel[1]}</span>
                  <span className="pill">{summaryLabel[2]}</span>
                </div>
                <div className="rail">
                  <button type="button" className="btn">导出</button>
                  <button type="button" className="btn">列设置</button>
                </div>
              </div>
              <table>
                <thead>
                  <tr>
                    <th>计划名称</th>
                    <th>业务说明</th>
                    <th className="num">消耗</th>
                    <th className="num">点击</th>
                    <th className="num">点击率</th>
                    <th className="num">ROI</th>
                    <th>状态</th>
                    <th className="num">操作</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((row) => (
                    <tr key={row.name} className={row.selected ? "row-selected" : ""}>
                      <td>
                        <div className="uikit-cell-stack">
                          <span className="uikit-truncate">{row.name}</span>
                          <span className="uikit-cell-sub">{row.sub}</span>
                        </div>
                      </td>
                      <td className="uikit-truncate">{row.sub}</td>
                      <td className="num uikit-mono">{row.spend}</td>
                      <td className="num uikit-mono">{row.click}</td>
                      <td className="num uikit-mono">{row.ctr}</td>
                      <td className={`num uikit-mono ${row.status === "风险" || row.status === "封顶" ? "warning" : ""}`}>{row.roi}</td>
                      <td><span className="status">{row.status}</span></td>
                      <td>
                        <div className="uikit-action-cell">
                          <button type="button" className="btn uikit-action">查看</button>
                          <button type="button" className="smart-btn smart-btn--ghost" aria-label="更多操作">
                            <i data-lucide="ellipsis" style={{ width: "14px", height: "14px", display: "inline-block" }}></i>
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="pager">
                <div className="meta">显示 1-6 / 共 28 条</div>
                <div className="rail">
                  <button type="button" className="btn">上一页</button>
                  <button type="button" className="btn">下一页</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ViewStage({ current }) {
      return (
        <section className="uikit-view" aria-label={current.title}>
          <div className="uikit-stage">
            <div className="uikit-view-header">
              <div className="uikit-view-copy">
                <h1 className="uikit-heading">{current.title}</h1>
                <p className="uikit-subheading">{current.subtitle}</p>
              </div>
              <div className="uikit-brief">
                <i data-lucide="info" style={{ width: "14px", height: "14px", display: "inline-block" }}></i>
                <span className="uikit-truncate">{current.insight}</span>
              </div>
            </div>
          </div>
          <MetricGrid metrics={current.metrics} />
          <div className="uikit-stage">
            <FilterPanel filters={current.filters} pills={current.statusPills} />
            <DataTable rows={current.rows} summaryLabel={current.summary} />
          </div>
        </section>
      );
    }

    function App() {
      const [activeView, setActiveView] = useState("overview");
      const current = useMemo(() => VIEWS[activeView], [activeView]);

      useEffect(() => {
        if (window.lucide && window.lucide.createIcons) {
          window.lucide.createIcons();
        }
      }, [activeView]);

      return (
        <div className="uikit-page">
          <div className="uikit-shell" data-layout-guard="uikit-v1" style={{ "--uikit-sidebar-w": "240px" }}>
            <aside className="uikit-sidebar">
              <SidebarNav activeView={activeView} onNavigate={setActiveView} />
            </aside>
            <main className="uikit-main">
              <div className="uikit-top-stack">
                <TopNavigation activeView={activeView} onNavigate={setActiveView} current={current} />
              </div>
              <div className="uikit-workspace">
                <ViewStage current={current} />
              </div>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
