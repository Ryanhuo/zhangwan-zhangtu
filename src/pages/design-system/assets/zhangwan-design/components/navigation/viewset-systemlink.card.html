<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<div id="root" style="padding:20px;font-family:var(--font-ui);background:var(--surface-canvas);display:flex;flex-direction:column;gap:16px;"></div>
<script type="text/babel">
const { ViewSet, SystemLink } = window.CompassDesignSystem_6dfef5;
function Demo() {
  const [activeId, setActiveId] = React.useState('1');
  const [views, setViews] = React.useState([
    { id: '1', label: '默认视图', color: '#f2f3f5', removable: false },
    { id: '2', label: '高价值用户', color: '#fdeed2' },
    { id: '3', label: '流失预警', color: '#ffe3e3' },
  ]);
  return (
    <div style={{display:'flex', flexDirection:'column', gap:16}}>
      <div style={{background:'#fff'}}>
        <ViewSet views={views} activeId={activeId} onSelect={setActiveId} onDelete={(v) => setViews(views.filter(x => x.id !== v.id))} />
      </div>
      <div style={{background:'#fff', padding:'0 4px'}}>
        <SystemLink systems={[
          { name: '掌玩', icon: '#00bf8a', link: '#' },
          { name: '掌上喵', items: [{ name: '漏斗分析', link: '#' }, { name: 'RFM', link: '#' }, { name: 'LTV', link: '#' }] },
        ]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
