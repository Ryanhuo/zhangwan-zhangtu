<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);display:flex;gap:16px;padding:20px;background:var(--surface-canvas);height:160px;box-sizing:border-box;align-items:center;}
  .box{background:var(--surface-card);width:120px;height:80px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-faint);text-align:center;}
</style>
<div class="box" style="border-radius:var(--radius-sm)">radius-sm 2px</div>
<div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-card)">radius-md 4px<br>+ shadow-card</div>
<div class="box" style="border-radius:var(--radius-lg)">radius-lg 5px</div>
<div class="box" style="border-radius:var(--radius-pill);width:80px;">radius-pill</div>
