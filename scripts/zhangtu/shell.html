<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260630b" />
    <link rel="icon" type="image/png" href="/favicon.png?v=20260630b" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260630b" />
    <title>__TITLE__</title>
    <style>
      /* ===== TraeWork design tokens (inlined from colors_and_type.css) ===== */
      :root {
        --primary: __PRIMARY__;
        --accent: __ACCENT__;

        /* radius */
        --radius-0: 0px; --radius-2: 2px; --radius-4: 4px; --radius-6: 6px;
        --radius-8: 8px; --radius-10: 10px; --radius-12: 12px; --radius-16: 16px;
        --radius-20: 20px; --radius-24: 24px; --radius-32: 32px; --radius-full: 999px;
        --border-width-default: 1px;

        /* spacers */
        --spacer-0: 0px; --spacer-2: 2px; --spacer-3: 3px; --spacer-4: 4px;
        --spacer-6: 6px; --spacer-8: 8px; --spacer-10: 10px; --spacer-12: 12px;
        --spacer-16: 16px; --spacer-20: 20px; --spacer-24: 24px; --spacer-32: 32px;
        --spacer-40: 40px; --spacer-48: 48px; --spacer-64: 64px;

        /* icon sizes */
        --icon-size-12: 12px; --icon-size-14: 14px; --icon-size-16: 16px;
        --icon-size-20: 20px; --icon-size-24: 24px;

        /* font */
        --font-family-default: "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-family-heading: "SF Pro", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-family-metric: "Inter", "SF Pro Text", "PingFang SC", system-ui, sans-serif;
        --font-family-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --font-weight-default: 400; --font-weight-medium: 500; --font-weight-strong: 600;

        /* body */
        --body-xs-font-size: 10px; --body-xs-line-height: 14px;
        --body-sm-font-size: 11px; --body-sm-line-height: 16px;
        --body-md-font-size: 12px; --body-md-line-height: 18px;
        --body-base-font-size: 14px; --body-base-line-height: 20px; --body-base-letter-spacing: -0.02em;
        --body-lg-font-size: 18px; --body-lg-line-height: 28px;

        /* heading */
        --heading-3xs-font-size: 11px; --heading-3xs-line-height: 16px;
        --heading-2xs-font-size: 12px; --heading-2xs-line-height: 18px;
        --heading-xs-font-size: 13px; --heading-xs-line-height: 20px;
        --heading-sm-font-size: 16px; --heading-sm-line-height: 24px;
        --heading-md-font-size: 20px; --heading-md-line-height: 28px;
        --heading-lg-font-size: 22px; --heading-lg-line-height: 30px;

        /* bg */
        --bg-base-default: #FFFFFF;
        --bg-base-secondary: #F5F5F5;
        --bg-base-tertiary: #E5E5E5;
        --bg-white: #FFFFFF;
        --bg-overlay-l1: rgba(115, 115, 115, 0.08);
        --bg-overlay-l2: rgba(115, 115, 115, 0.12);
        --bg-overlay-l3: rgba(115, 115, 115, 0.16);
        --bg-overlay-l4: rgba(115, 115, 115, 0.20);
        --bg-menu: #FFFFFF;
        --bg-invert: #262626; --bg-invert-hover: #404040; --bg-invert-active: #171717;
        --bg-invert-disabled: rgba(115, 115, 115, 0.20);

        /* bg-brand */
        --bg-brand: #4B3FE3; --bg-brand-hover: #6A6FFF; --bg-brand-active: #3F31C6;
        --bg-brand-disabled: rgba(75, 63, 227, 0.22); --bg-brand-popup: rgba(170, 183, 255, 0.36);

        /* text */
        --text-default: #171717; --text-secondary: #404040; --text-tertiary: #737373;
        --text-disabled: #A1A1A1; --text-onbrand: #FFFFFF; --text-white: #FFFFFF;
        --text-brand: #4B3FE3;

        /* icon */
        --icon-default: #262626; --icon-secondary: #404040; --icon-tertiary: #737373;
        --icon-disabled: #A1A1A1; --icon-brand: #4B3FE3;

        /* border */
        --border-neutral-l1: rgba(115, 115, 115, 0.12);
        --border-neutral-l2: rgba(115, 115, 115, 0.18);
        --border-neutral-l3: rgba(115, 115, 115, 0.36);
        --border-contrast: #000000; --border-brand: #4B3FE3;

        /* status */
        --status-primary-default: #2F74FF; --status-success-default: #15A877;
        --status-warning-default: #E27900; --status-error-default: #E8463A;
        --status-success-surface-l1: rgba(64, 176, 139, 0.12);
        --status-warning-surface-l1: rgba(226, 121, 0, 0.12);
        --status-error-surface-l1: rgba(232, 70, 58, 0.12);
        --status-error-surface-l2: rgba(232, 70, 58, 0.16);

        /* code */
        --code-editor-font-family: var(--font-family-mono);
        --code-editor-font-size: 13px;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; padding: 0; }

      body {
        min-width: 0;
        margin: 0;
        background: var(--bg-base-secondary);
        color: var(--text-default);
        font-family: var(--font-family-default);
        font-size: var(--body-base-font-size);
        line-height: var(--body-base-line-height);
        letter-spacing: var(--body-base-letter-spacing);
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        padding: var(--spacer-0);
      }

      button, input, textarea { font: inherit; }
      .hidden { display: none !important; }

      /* ===== Shell layout ===== */
      .shell {
        position: relative;
        display: flex;
        width: 100%;
        min-width: 0;
        height: 100dvh;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: var(--bg-base-secondary);
        color: var(--text-default);
      }

      .side {
        position: relative;
        z-index: 2;
        width: 264px;
        flex: 0 0 264px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding-top: var(--spacer-8);
        border-radius: 0;
        background: var(--bg-base-secondary);
        transition: width 0.2s ease, flex-basis 0.2s ease;
      }

      .shell.collapsed .side { width: 0; flex-basis: 0; border: 0; }
      .shell.collapsed .side > * { opacity: 0; visibility: hidden; }

      .side-header {
        height: 48px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: var(--spacer-0) var(--spacer-8);
      }

      .project-trigger {
        width: 100%;
        display: flex;
        align-items: center;
        gap: var(--spacer-10);
        height: 48px;
        padding: var(--spacer-0) var(--spacer-10);
        border: 1px solid transparent;
        border-radius: var(--radius-8);
        background: transparent;
        color: var(--text-default);
        cursor: pointer;
        text-align: left;
        transition: background 0.12s ease;
      }
      .project-trigger:hover { background: var(--bg-overlay-l1); }

      .project-mark {
        width: 30px; height: 30px;
        border-radius: var(--radius-8);
        display: inline-flex; align-items: center; justify-content: center;
        flex: 0 0 auto;
        background: linear-gradient(180deg, #ffffff, #f3f4f6);
        color: #111827;
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      }

      .project-mark svg {
        width: 22px;
        height: 22px;
        display: block;
      }

      .project-copy {
        min-width: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 2px;
      }
      .project-name {
        display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font-size: 16px; font-weight: var(--font-weight-strong);
        color: var(--text-default);
      }
      .project-subtitle {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-tertiary);
        font-size: var(--body-xs-font-size);
        line-height: var(--body-xs-line-height);
      }
      .project-name-input {
        width: 100%;
        height: 28px;
        padding: 0 var(--spacer-8);
        border: 1px solid var(--border-neutral-l2);
        border-radius: var(--radius-8);
        background: var(--bg-base-default);
        color: var(--text-default);
        font-size: var(--body-base-font-size);
        line-height: var(--body-base-line-height);
      }
      .project-name-input:focus {
        outline: none;
        border-color: var(--border-contrast);
      }
      .project-trigger.is-readonly {
        cursor: default;
      }
      .project-trigger.is-readonly:hover {
        background: transparent;
      }
      .side-scroll {
        flex: 1; min-height: 0; overflow: auto;
        padding: var(--spacer-12) var(--spacer-8);
      }

      .nav-group-title {
        padding: var(--spacer-12) var(--spacer-10) var(--spacer-4);
        color: var(--text-tertiary);
        font-size: var(--body-xs-font-size);
        font-weight: var(--font-weight-strong);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .nav-group-title:first-child { padding-top: var(--spacer-4); }

      .nav-item {
        width: 100%; display: flex; align-items: center; gap: var(--spacer-10);
        margin-bottom: var(--spacer-2);
        padding: var(--spacer-8) var(--spacer-10);
        border: 0; border-radius: var(--radius-8);
        background: transparent; color: var(--text-default);
        text-align: left; cursor: pointer;
        transition: background 0.12s ease, color 0.12s ease;
      }
      .nav-item:hover { background: var(--bg-overlay-l1); }
      .nav-item.active { background: var(--bg-overlay-l2); color: var(--text-default); font-weight: var(--font-weight-medium); }

      .nav-item-icon {
        width: var(--icon-size-16); height: var(--icon-size-16);
        display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
      }
      .nav-item-copy { min-width: 0; flex: 1; display: flex; flex-direction: column; }
      .nav-item-title {
        display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font-size: var(--body-base-font-size); line-height: var(--body-base-line-height);
      }
      .nav-item--skills .nav-item-title {
        height: 28px;
        padding-top: 4px;
        padding-bottom: 4px;
        font-size: 14px;
      }
      .nav-item--skills .nav-item-title {
        font-family: "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .nav-item--skills .nav-item-icon svg {
        font-size: 14px;
      }
      .nav-item-meta {
        display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        margin-top: var(--spacer-2);
        color: var(--text-tertiary);
        font-size: var(--body-xs-font-size); line-height: var(--body-xs-line-height);
        font-family: var(--code-editor-font-family);
      }

      /* ===== Folder tree ===== */
      .nav-section-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px var(--spacer-10) 8px;
        font-size: 16px;
      }
      .nav-section-meta {
        padding: 0 var(--spacer-10) var(--spacer-8);
        color: var(--text-tertiary);
        font-size: 11px;
        line-height: 1.45;
      }
      .nav-section-title {
        color: var(--text-tertiary); font-size: var(--body-xs-font-size);
        font-weight: var(--font-weight-strong); text-transform: uppercase; letter-spacing: 0.04em;
      }
      .nav-add-btn {
        width: 20px; height: 20px; border: 0; background: transparent;
        color: var(--text-tertiary); cursor: pointer; border-radius: var(--radius-4);
        display: flex; align-items: center; justify-content: center; padding: 0;
      }
      .nav-add-btn:hover { background: var(--bg-overlay-l2); color: var(--text-default); }
      .nav-folder { margin-bottom: var(--spacer-2); }
      .nav-folder-header {
        width: 100%; display: flex; align-items: center; gap: var(--spacer-6);
        padding: var(--spacer-6) var(--spacer-10); border: 0; border-radius: var(--radius-8);
        background: transparent; color: var(--text-secondary); text-align: left; cursor: pointer;
        font-size: var(--body-base-font-size); transition: background 0.12s ease; margin-bottom: var(--spacer-2);
      }
      .nav-folder-header:hover { background: var(--bg-overlay-l1); }
      .nav-folder-header::after {
        content: "拖入";
        opacity: 0;
        transform: translateX(-4px);
        transition: opacity 0.12s ease, transform 0.12s ease;
        color: var(--text-brand);
        font-size: 11px;
        flex: 0 0 auto;
      }
      .nav-folder.drag-over .nav-folder-header::after,
      .nav-folder.drag-folder-over .nav-folder-header::after {
        opacity: 1;
        transform: translateX(0);
      }
      .nav-folder-toggle { flex: 0 0 auto; transition: transform 0.15s ease; display: flex; align-items: center; }
      .nav-folder-toggle.open { transform: rotate(90deg); }
      .nav-folder-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .nav-folder-body { padding-left: var(--spacer-16); }
      .nav-folder-body.hidden { display: none; }
      /* Context menu */
      .nav-ctx-menu {
        position: fixed; z-index: 2000;
        background: var(--bg-base-default); border: 1px solid var(--border-neutral-l2);
        border-radius: var(--radius-8); box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        padding: var(--spacer-4); min-width: 164px;
      }
      .nav-ctx-item {
        width: 100%; padding: var(--spacer-6) var(--spacer-12); border: 0;
        background: transparent; text-align: left; cursor: pointer;
        color: var(--text-default); font-size: var(--body-sm-font-size);
        border-radius: var(--radius-4); display: block;
      }
      .nav-ctx-item:hover { background: var(--bg-overlay-l1); }
      .nav-ctx-item.danger { color: #ef4444; }

      /* Drag-and-drop states */
      .nav-item[draggable="true"] { cursor: grab; }
      .nav-item.drag-source { opacity: 0.35; pointer-events: none; }
      .nav-folder.drag-over > .nav-folder-header { background: rgba(75,63,227,0.08) !important; outline: 2px dashed var(--text-brand); outline-offset: -2px; border-radius: var(--radius-8); }
      .nav-root-drop { min-height: 8px; border-radius: var(--radius-8); transition: background 0.1s, outline 0.1s; }
      .nav-root-drop.drag-over { background: rgba(75,63,227,0.05); outline: 2px dashed var(--text-brand); outline-offset: -2px; }
      .nav-root-drop.drag-over::after {
        content: "松开后移到根目录";
        display: block;
        padding: 0 var(--spacer-10) var(--spacer-8);
        color: var(--text-brand);
        font-size: 11px;
      }

      /* Drag insertion indicator line */
      .drag-indicator {
        position: fixed;
        left: 0; right: 0;
        height: 2px;
        background: var(--text-brand);
        border-radius: 1px;
        z-index: 1500;
        pointer-events: none;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.8);
        display: none;
      }
      .drag-indicator::before {
        content: "";
        position: absolute;
        left: -4px; top: -3px;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--text-brand);
      }
      .nav-folder.drag-folder-over > .nav-folder-header {
        background: rgba(75,63,227,0.06) !important;
        outline: 2px dashed var(--text-brand);
        outline-offset: -2px;
        border-radius: var(--radius-8);
      }
      body.nav-page-dragging {
        user-select: none;
        cursor: grabbing;
      }

      /* Inline edit input (new folder, inline rename) */
      .nav-inline-edit { display: flex; align-items: center; gap: var(--spacer-6); padding: var(--spacer-3) var(--spacer-10); }
      .nav-inline-edit-input {
        flex: 1; min-width: 0;
        font-size: var(--body-base-font-size); font-family: inherit;
        background: var(--bg-base-default); color: var(--text-default);
        border: 1.5px solid var(--text-brand); border-radius: var(--radius-4);
        padding: 2px var(--spacer-6); outline: none;
      }
      /* Inline rename for nav-item-title — replaces the span in-place */
      .nav-item-title-input {
        flex: 1; min-width: 0; width: 100%;
        font-size: var(--body-base-font-size); font-family: inherit;
        background: var(--bg-base-default); color: var(--text-default);
        border: 1.5px solid var(--text-brand); border-radius: var(--radius-4);
        padding: 1px var(--spacer-4); outline: none;
      }

      .rename-dialog-panel {
        background: var(--bg-base-default); border: 1px solid var(--border-neutral-l2);
        border-radius: var(--radius-12); box-shadow: 0 16px 40px rgba(0,0,0,0.18);
        padding: var(--spacer-20); width: 360px;
      }
      .rename-dialog-head {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: var(--spacer-16);
      }
      .rename-dialog-head span {
        font-size: var(--body-base-font-size); font-weight: var(--font-weight-medium); color: var(--text-default);
      }
      .rename-dialog-form { display: flex; gap: var(--spacer-8); }
      .rename-dialog-form input {
        flex: 1; height: 32px; padding: 0 var(--spacer-10);
        border: 1px solid var(--border-neutral-l2); border-radius: var(--radius-6);
        background: var(--bg-base-default); font-size: var(--body-sm-font-size);
        color: var(--text-default); outline: none;
      }
      .rename-dialog-form input:focus { border-color: var(--border-contrast); }
      .rename-dialog-form button { flex-shrink: 0; }

      .shell.collapsed .project-copy,
      .shell.collapsed .nav-item-copy,
      .shell.collapsed .nav-group-title,
      .shell.collapsed .nav-section-title,
      .shell.collapsed .nav-add-btn,
      .shell.collapsed .nav-folder-name { display: none; }
      .shell.collapsed .nav-item { justify-content: center; padding: var(--spacer-10); }
      .shell.collapsed .nav-folder-header { justify-content: center; padding: var(--spacer-10); }
      .shell.collapsed .nav-folder-body { padding-left: 0; }
      .shell.collapsed .project-trigger { justify-content: center; padding: var(--spacer-6); }

      /* ===== Main area ===== */
      .main {
        position: relative;
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        margin: var(--spacer-12) var(--spacer-12) var(--spacer-12) 0;
        overflow: hidden;
        border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-24);
        background: var(--bg-white);
        box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
        transition: margin 0.2s ease, border-radius 0.2s ease;
      }
      .shell.collapsed .main { margin: var(--spacer-12); }

      .main-header {
        height: 48px; flex: 0 0 48px;
        display: flex; align-items: center; justify-content: space-between;
        padding: var(--spacer-0) var(--spacer-20);
        background: var(--bg-base-default);
        border-bottom: 1px solid var(--border-neutral-l1);
      }

      .main-header-left { display: flex; align-items: center; gap: var(--spacer-12); min-width: 0; }

      .main-toggle-btn {
        width: 32px; height: 32px; flex: 0 0 32px;
        display: inline-flex; align-items: center; justify-content: center;
        border: 0; border-radius: var(--radius-8);
        background: transparent; color: var(--icon-secondary); cursor: pointer;
        transition: background 0.12s ease;
      }
      .main-toggle-btn:hover { background: var(--bg-overlay-l1); color: var(--icon-default); }
      .main-toggle-btn.with-label {
        width: auto;
        flex: 0 0 auto;
        padding: 0 var(--spacer-10);
        gap: var(--spacer-6);
        color: var(--text-secondary);
      }

      .main-header-right { display: flex; align-items: center; gap: var(--spacer-8); }

      .device-switch {
        position: relative;
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
      }
      .device-switch-trigger {
        height: 28px; min-width: 36px; padding: 0 var(--spacer-8);
        display: inline-flex; align-items: center; justify-content: center; gap: var(--spacer-6);
        border: 1px solid transparent; border-radius: var(--radius-8);
        background: transparent; color: var(--text-secondary); cursor: pointer;
        transition: background 0.12s ease, color 0.12s ease;
      }
      .device-switch-trigger:hover,
      .device-switch-trigger.is-open {
        background: var(--bg-overlay-l1);
        color: var(--text-default);
      }
      .device-switch-trigger svg { display: block; }
      .device-switch-menu {
        position: absolute;
        top: calc(100% + var(--spacer-8));
        left: 0;
        z-index: 60;
        min-width: 168px;
        padding: var(--spacer-8);
        border: 1px solid var(--border-neutral-l2);
        border-radius: var(--radius-12);
        background: var(--bg-menu);
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      }
      .device-switch-option {
        width: 100%;
        height: 44px;
        display: flex; align-items: center; gap: var(--spacer-10);
        padding: 0 var(--spacer-12);
        border: 0; border-radius: var(--radius-10);
        background: transparent; color: var(--text-default);
        cursor: pointer; text-align: left;
        font-size: var(--body-base-font-size); line-height: var(--body-base-line-height);
        font-weight: var(--font-weight-medium);
      }
      .device-switch-option:hover { background: var(--bg-overlay-l1); }
      .device-switch-option.active { background: var(--bg-overlay-l2); }
      .device-switch-option svg { display: block; flex: 0 0 auto; color: var(--icon-secondary); }

      .main-action-btn {
        height: 28px; padding: 0 var(--spacer-10);
        display: inline-flex; align-items: center; gap: var(--spacer-6);
        border: 1px solid transparent; border-radius: var(--radius-8);
        background: transparent; color: var(--text-secondary); cursor: pointer;
        font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height);
        transition: background 0.12s ease, color 0.12s ease;
      }
      .main-action-btn--first {
        justify-content: flex-start;
      }
      .main-action-btn:hover { background: var(--bg-overlay-l1); color: var(--text-default); }
      .main-action-btn.is-active { background: var(--bg-overlay-l2); color: var(--text-default); }
      .main-action-btn svg { display: block; }
      .main-action-btn.icon-only {
        width: 28px;
        padding: 0;
        justify-content: center;
        gap: 0;
      }

      .main-stage { flex: 1; min-height: 0; overflow: hidden; background: var(--bg-base-secondary); }

      /* ===== Live preview frame ===== */
      .live-preview-shell {
        position: relative;
        height: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 0;
        align-items: stretch;
        gap: 0;
        padding: 0;
        background: var(--bg-base-default);
        transition: grid-template-columns 0.22s ease;
      }
      .live-preview-shell.has-requirements-sidebar {
        grid-template-columns: minmax(0, 1fr) minmax(340px, 360px);
      }
      .frame-layout { min-width: 0; display: flex; align-items: stretch; justify-content: stretch; padding: 0; overflow: hidden; }
      .frame-wrap {
        width: 100%;
        max-width: 100%;
        height: 100%;
        border: 1px solid var(--border-neutral-l1);
        border-radius: 0;
        background: var(--bg-base-default);
        box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }
      .frame-wrap.mobile { max-width: 390px; }
      .frame-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }

      .live-preview-shell.device-mobile {
        --phone-frame-width: 414px;
        --phone-frame-height: 868px;
        --phone-frame-padding: 12px;
        grid-template-columns: minmax(0, 1fr);
        background:
          radial-gradient(circle at 50% 44%, rgba(148, 163, 184, 0.22), transparent 34%),
          linear-gradient(90deg, rgba(248, 250, 252, 0.96) 0%, rgba(255, 255, 255, 1) 52%, rgba(248, 250, 252, 0.96) 100%);
      }
      .live-preview-shell.device-mobile.has-requirements-sidebar {
        grid-template-columns: minmax(0, 1fr);
      }
      .live-preview-shell.device-mobile .frame-layout {
        justify-content: center;
        align-items: center;
        padding: var(--spacer-20) var(--spacer-24);
        background: transparent;
      }
      .live-preview-shell.device-mobile .frame-wrap.mobile {
        position: relative;
        width: auto;
        max-width: min(var(--phone-frame-width), calc(100% - 48px));
        height: min(var(--phone-frame-height), calc(100% - 40px));
        aspect-ratio: 414 / 868;
        flex: 0 0 auto;
        padding: var(--phone-frame-padding);
        border: 1px solid rgba(15, 23, 42, 0.78);
        border-radius: 48px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.16), transparent 20%),
          linear-gradient(150deg, #2b3039 0%, #07090f 45%, #1c222b 100%);
        box-shadow:
          0 34px 74px rgba(15, 23, 42, 0.28),
          0 10px 26px rgba(15, 23, 42, 0.18),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          inset 0 -18px 36px rgba(0, 0, 0, 0.24);
        overflow: visible;
      }
      .live-preview-shell.device-mobile .frame-wrap.mobile::before {
        content: "";
        position: absolute;
        z-index: 3;
        top: 21px;
        left: 50%;
        width: 92px;
        height: 26px;
        border-radius: 999px;
        background: #05070a;
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.1),
          0 2px 8px rgba(0, 0, 0, 0.26);
        transform: translateX(-50%);
        pointer-events: none;
      }
      .live-preview-shell.device-mobile .frame-wrap.mobile::after {
        content: "";
        position: absolute;
        z-index: 3;
        left: 50%;
        bottom: 23px;
        width: 112px;
        height: 4px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.42);
        transform: translateX(-50%);
        pointer-events: none;
      }
      .live-preview-shell.device-mobile .frame-wrap.mobile iframe {
        position: relative;
        z-index: 1;
        border-radius: 35px;
        background: #ffffff;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.08),
          inset 0 0 0 1px rgba(15, 23, 42, 0.08);
      }

      /* ===== Requirements sidebar ===== */
      .requirements-sidebar {
        min-width: 0;
        width: 0;
        overflow: hidden;
        border: 1px solid transparent;
        border-radius: 0;
        background: #ffffff;
        box-shadow: -12px 0 28px rgba(15, 23, 42, 0.05);
        opacity: 0;
        transform: translateX(12px);
        transition: width 0.22s ease, opacity 0.18s ease, transform 0.22s ease, border-color 0.18s ease;
      }
      .requirements-sidebar.is-open {
        width: 100%;
        opacity: 1;
        transform: translateX(0);
        border-color: var(--border-neutral-l1);
      }

      .live-preview-shell.device-mobile .requirements-sidebar {
        position: absolute;
        z-index: 4;
        top: var(--spacer-20);
        right: var(--spacer-20);
        bottom: var(--spacer-20);
        width: min(336px, calc((100% - var(--phone-frame-width)) / 2 - 32px));
        min-width: 280px;
        border-radius: var(--radius-16);
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
        transform: translateX(10px);
      }
      .live-preview-shell.device-mobile .requirements-sidebar.is-open {
        width: min(336px, calc((100% - var(--phone-frame-width)) / 2 - 32px));
        transform: translateX(0);
      }
      @media (max-width: 1180px) {
        .live-preview-shell.device-mobile .frame-layout {
          padding: var(--spacer-16);
        }
        .live-preview-shell.device-mobile .requirements-sidebar {
          top: auto;
          left: var(--spacer-16);
          right: var(--spacer-16);
          bottom: var(--spacer-16);
          width: auto;
          min-width: 0;
          height: min(42vh, 360px);
        }
        .live-preview-shell.device-mobile .requirements-sidebar.is-open {
          width: auto;
        }
      }

      .requirements-panel { display: flex; flex-direction: column; height: 100%; }

      .requirements-panel-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: var(--spacer-8) var(--spacer-10);
        padding: var(--spacer-12);
        border-bottom: 1px solid var(--border-neutral-l1);
      }
      .requirements-panel-title { min-width: 0; padding-top: 1px; }
      .requirements-panel-head h2 { margin: 0; font-size: 16px; line-height: 22px; font-weight: var(--font-weight-strong); color: var(--text-default); }
      .requirements-panel-head p { margin: var(--spacer-2) 0 0; color: var(--text-tertiary); font-size: 12px; line-height: 18px; }
      .requirements-panel-controls { display: flex; align-items: center; gap: var(--spacer-6); flex-shrink: 0; }
      .requirements-panel-controls .tool-button {
        height: 32px;
        padding: 0 var(--spacer-10);
        border-radius: var(--radius-8);
        font-size: 12px;
        line-height: 18px;
      }
      .requirements-color-label {
        display: inline-flex; align-items: center; justify-content: center;
        width: 32px; height: 32px; border-radius: var(--radius-8);
        border: 1px solid var(--border-neutral-l2);
        cursor: pointer; overflow: hidden; position: relative;
        background: transparent;
      }
      .requirements-color-label:hover { border-color: var(--border-neutral-l3); }
      .requirements-color-preview {
        width: 16px; height: 16px; border-radius: 50%;
        border: 1.5px solid rgba(255,255,255,0.5);
        flex-shrink: 0;
      }
      .requirements-color-label input[type="color"] {
        position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
      }

      .requirements-panel-summary {
        padding: 0 var(--spacer-20) var(--spacer-12);
        color: var(--text-tertiary);
        font-size: var(--body-sm-font-size);
        line-height: var(--body-sm-line-height);
      }

      .requirements-list { flex: 1; min-height: 0; overflow: auto; padding: var(--spacer-8) var(--spacer-12) var(--spacer-16); display: flex; flex-direction: column; gap: var(--spacer-10); }

      .requirement-card {
        width: 100%;
        padding: var(--spacer-12);
        border: 1px solid var(--border-neutral-l1); border-radius: var(--radius-12);
        background: #ffffff; color: var(--text-default);
        transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
      }
      .requirement-card-hit {
        width: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        text-align: left;
        color: inherit;
        cursor: pointer;
      }
      .requirement-card:hover {
        background: var(--bg-base-secondary);
        border-color: rgba(37, 99, 235, 0.18);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        transform: translateY(-1px);
      }
      .requirement-card.active {
        border-color: rgba(37, 99, 235, 0.22);
        background: color-mix(in srgb, var(--bg-brand) 5%, #ffffff);
        box-shadow: 0 10px 22px rgba(37, 99, 235, 0.08);
      }

      .requirement-title { display: flex; align-items: flex-start; gap: var(--spacer-8); margin-bottom: var(--spacer-6); }
      .requirement-number {
        display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 var(--spacer-6);
        border-radius: var(--radius-full); background: var(--bg-brand); color: var(--text-white);
        font-size: var(--body-xs-font-size); font-family: var(--code-editor-font-family); white-space: nowrap;
      }
      .requirement-title > span:last-child {
        min-width: 0;
        font-weight: var(--font-weight-strong); font-size: 14px; line-height: 20px;
      }
      .requirement-meta { display: flex; flex-wrap: wrap; gap: var(--spacer-6); margin-bottom: var(--spacer-6); }
      .requirement-pill {
        display: inline-flex; align-items: center; height: 20px; padding: 0 var(--spacer-8);
        border: 1px solid rgba(37, 99, 235, 0.18); border-radius: 999px;
        background: rgba(37, 99, 235, 0.05); color: #2563eb;
        font-size: var(--body-xs-font-size); font-weight: var(--font-weight-medium);
      }
      .requirement-pill--ref {
        border-color: rgba(100, 116, 139, 0.16);
        background: rgba(100, 116, 139, 0.08);
        color: var(--text-secondary);
        font-family: var(--code-editor-font-family);
      }
      .requirement-rich {
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 18px;
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
      }
      .requirement-rich h1, .requirement-rich h2, .requirement-rich h3, .requirement-rich h4,
      .requirement-rich p, .requirement-rich ul, .requirement-rich blockquote, .requirement-rich hr {
        margin: 0;
        display: inline;
      }
      .requirement-rich ul { padding-left: 0; list-style: none; }
      .requirement-rich li { display: inline; }
      .requirement-rich li::after, .requirement-rich p::after { content: " "; }
      .requirement-rich code {
        padding: 1px 4px;
        border-radius: 5px;
        background: rgba(15, 23, 42, 0.05);
        font-family: var(--code-editor-font-family);
        font-size: 11px;
      }
      .requirement-rich blockquote {
        padding-left: 0;
        border-left: 0;
        color: var(--text-tertiary);
      }
      .requirement-table-wrap, .requirement-table { display: none; }

      .requirements-search-row { padding: var(--spacer-10) var(--spacer-12) var(--spacer-6); }
      .requirements-search-input {
        width: 100%; height: 34px; padding: 0 var(--spacer-12);
        border: 1px solid var(--border-neutral-l2); border-radius: var(--radius-8);
        background: var(--bg-base-default); color: var(--text-default);
        font-size: 12px; outline: none;
        transition: border-color 0.12s ease;
        box-sizing: border-box;
      }
      .requirements-search-input:focus { border-color: #2563eb; }
      .requirements-search-input::placeholder { color: var(--text-tertiary); }

      .requirement-card-actions {
        display: flex;
        justify-content: flex-end;
        gap: var(--spacer-8);
        margin-top: var(--spacer-10);
        padding-top: var(--spacer-4);
        border-top: 1px dashed rgba(148, 163, 184, 0.18);
      }

      .empty-state {
        padding: var(--spacer-32) var(--spacer-16); text-align: center;
        color: var(--text-tertiary); font-size: var(--body-base-font-size);
      }

      /* ===== 工作流视图（第 3 期）：横向泳道 + 贯穿层 + 回环，绿色为掌玩品牌主色 ===== */
      .wf-shell { height: 100%; background: var(--bg-base-secondary); }
      .wf-scroll { height: 100%; overflow: auto; padding: 28px 32px 40px; box-sizing: border-box; }
      .wf-view { max-width: 1240px; margin: 0 auto; }
      .wf-head h1 { margin: 0 0 6px; font-size: 20px; font-weight: 600; color: var(--text-default); letter-spacing: -0.01em; }
      .wf-head p { margin: 0 0 20px; font-size: 13px; line-height: 1.6; color: var(--text-tertiary); max-width: 720px; }

      /* 贯穿层横幅 */
      .wf-layer {
        display: flex; align-items: center; gap: 14px;
        padding: 12px 16px; margin-bottom: 18px;
        background: rgba(0, 191, 138, 0.07);
        border: 1px solid rgba(0, 191, 138, 0.24);
        border-radius: 8px;
      }
      .wf-layer-tag {
        flex: 0 0 auto; font-size: 11px; font-weight: 600; color: #04795a;
        padding: 3px 8px; border-radius: 11px; background: #e1fff0; border: 1px solid rgba(0, 191, 138, 0.28);
      }
      .wf-layer-body { font-size: 12.5px; line-height: 1.55; color: var(--text-secondary); }
      .wf-layer-body strong { color: #04795a; margin-right: 6px; }
      .wf-layer-body code, .wf-cap code {
        font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11.5px;
        background: rgba(0, 0, 0, 0.05); border-radius: 4px; padding: 1px 5px;
      }

      /* 泳道 */
      .wf-lane { display: flex; align-items: stretch; gap: 0; overflow-x: auto; padding-bottom: 6px; }
      .wf-arrow {
        flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
        padding: 0 6px; color: #00bf8a; font-size: 22px; font-weight: 700; align-self: center;
      }
      .wf-block {
        flex: 1 1 0; min-width: 236px;
        display: flex; flex-direction: column;
        background: var(--bg-base-default);
        border: 1px solid var(--border-neutral-l2); border-radius: 10px;
        overflow: hidden;
      }
      .wf-block-head { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--border-neutral-l1); }
      .wf-block-key {
        flex: 0 0 auto; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center;
        font-size: 12px; font-weight: 700; color: #fff; background: #00bf8a; border-radius: 6px;
      }
      .wf-block-title { font-size: 14px; font-weight: 600; color: var(--text-default); }
      .wf-block-caps { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 12px 14px; }

      .wf-cap { border: 1px solid var(--border-neutral-l1); border-radius: 8px; padding: 10px 12px; background: var(--bg-base-secondary); }
      .wf-cap-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .wf-cap-block { flex: 0 0 auto; font-size: 11px; color: var(--text-tertiary); font-weight: 600; }
      .wf-cap-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-default); }
      .wf-support { flex: 0 0 auto; font-size: 10.5px; padding: 1px 7px; border-radius: 11px; font-weight: 500; }
      .wf-support--full { color: #04795a; background: #e1fff0; border: 1px solid rgba(0, 191, 138, 0.28); }
      .wf-support--partial { color: #9a6a00; background: #fff6e0; border: 1px solid rgba(214, 158, 46, 0.32); }
      .wf-io { display: flex; align-items: stretch; gap: 6px; margin-bottom: 8px; }
      .wf-io-cell { flex: 1; font-size: 11.5px; line-height: 1.45; color: var(--text-secondary); }
      .wf-io-cell em { display: block; font-style: normal; font-size: 10px; color: var(--text-tertiary); margin-bottom: 2px; }
      .wf-io-sep { flex: 0 0 auto; align-self: center; color: #00bf8a; font-weight: 700; }
      .wf-chips { display: flex; flex-wrap: wrap; gap: 5px; }
      .wf-chip { font-size: 11px; padding: 2px 8px; border-radius: 11px; white-space: nowrap; }
      .wf-chip--skill { color: #04795a; background: #e1fff0; border: 1px solid rgba(0, 191, 138, 0.22); }
      .wf-chip--cmd { color: var(--text-secondary); background: var(--bg-base-tertiary); border: 1px solid var(--border-neutral-l2); font-family: ui-monospace, Menlo, Consolas, monospace; }
      .wf-default { margin-top: 8px; font-size: 11px; color: #04795a; }

      .wf-block-jumps { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 14px 14px; }
      .wf-jump {
        display: inline-flex; align-items: center; height: 28px; padding: 0 12px;
        font-size: 12px; font-family: inherit; cursor: pointer;
        color: #04795a; background: #fff; border: 1px solid rgba(0, 191, 138, 0.4); border-radius: 8px;
        transition: background 0.12s ease, border-color 0.12s ease;
      }
      .wf-jump:hover { background: #e1fff0; border-color: #00bf8a; }

      /* 回环 */
      .wf-loop {
        display: flex; align-items: flex-start; gap: 12px; margin-top: 18px;
        padding: 12px 16px; border-radius: 8px;
        background: var(--bg-base-default); border: 1px dashed rgba(0, 191, 138, 0.5);
        font-size: 12.5px; line-height: 1.55; color: var(--text-secondary);
      }
      .wf-loop strong { color: #04795a; }
      .wf-loop-icon { flex: 0 0 auto; font-size: 18px; color: #00bf8a; line-height: 1.3; }

      @media (max-width: 900px) {
        .wf-lane { flex-direction: column; }
        .wf-arrow { transform: rotate(90deg); padding: 4px 0; }
        .wf-block { flex: 0 0 auto; min-width: 0; }
      }

      /* ===== Version modal (ds-dialog style) ===== */
      .modal-backdrop {
        position: fixed; inset: 0; z-index: 100;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.16); padding: var(--spacer-24);
      }

      .version-modal {
        width: 880px; max-width: 100%; max-height: 85vh;
        display: flex; flex-direction: column;
        background: var(--bg-base-default);
        border: 1px solid var(--border-neutral-l2);
        border-radius: var(--radius-16);
        box-shadow: 0 16px 48px rgba(0,0,0,0.16);
        overflow: hidden;
      }

      .version-modal-head {
        display: flex; align-items: flex-start; justify-content: space-between;
        gap: var(--spacer-16);
        padding: var(--spacer-20) var(--spacer-24);
        border-bottom: 1px solid var(--border-neutral-l1);
      }
      .version-modal-head h2 { margin: 0; font-size: var(--heading-sm-font-size); line-height: var(--heading-sm-line-height); font-weight: var(--font-weight-strong); }
      .version-modal-head span { color: var(--text-tertiary); font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height); }

      .version-modal-body { flex: 1; min-height: 0; display: flex; gap: var(--spacer-24); padding: var(--spacer-24); overflow: hidden; }
      .version-modal--editor { width: 760px; }
      .version-modal--list { width: 560px; }
      .version-modal--publish-config { width: 560px; }
      .version-modal-body--stack { display: block; }

      .version-form { flex: 1; min-width: 0; min-height: 0; display: flex; flex-direction: column; gap: var(--spacer-16); }
      .version-list { display: flex; flex-direction: column; gap: var(--spacer-12); overflow: auto; }
      .version-list-head { display: flex; align-items: center; justify-content: space-between; gap: var(--spacer-12); margin-bottom: var(--spacer-12); }
      #version-list { display: flex; flex-direction: column; gap: var(--spacer-12); }

      .field { display: flex; flex-direction: column; gap: var(--spacer-6); }
      .field label { font-size: var(--body-sm-font-size); font-weight: var(--font-weight-medium); color: var(--text-secondary); }
      .field input, .field textarea {
        width: 100%; padding: var(--spacer-8) var(--spacer-12);
        border: 1px solid var(--border-neutral-l1); border-radius: var(--radius-8);
        background: var(--bg-base-default); color: var(--text-default);
        font-size: var(--body-base-font-size); line-height: var(--body-base-line-height);
      }
      .field input:focus, .field textarea:focus { outline: none; border-color: var(--border-contrast); }
      .field input::placeholder, .field textarea::placeholder { color: var(--text-tertiary); }
      .field textarea { min-height: 72px; resize: vertical; }
      .field .field-hint { font-size: var(--body-xs-font-size); color: var(--text-tertiary); }

      .publish-config-note {
        display: flex;
        flex-direction: column;
        gap: var(--spacer-6);
        padding: var(--spacer-14) var(--spacer-16);
        border: 1px solid rgba(37, 99, 235, 0.14);
        border-radius: var(--radius-12);
        background: rgba(37, 99, 235, 0.05);
      }
      .publish-config-note strong {
        font-size: var(--body-sm-font-size);
        line-height: var(--body-sm-line-height);
        color: var(--text-default);
      }
      .publish-config-note span,
      .publish-config-meta {
        font-size: var(--body-xs-font-size);
        line-height: var(--body-xs-line-height);
        color: var(--text-tertiary);
      }
      .publish-config-meta {
        display: flex;
        flex-direction: column;
        gap: var(--spacer-4);
      }

      .page-checks {
        max-height: min(34vh, 360px);
        min-height: 188px;
        overflow: auto;
        padding: var(--spacer-10);
        border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-12);
        background: var(--bg-base-secondary);
      }
      .vtree-root { display: flex; flex-direction: column; gap: var(--spacer-8); }
      .vtree-row {
        display: flex; align-items: center; gap: var(--spacer-8);
        min-height: 40px;
        padding: var(--spacer-8) var(--spacer-10);
        border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-8);
        background: var(--bg-base-default);
        cursor: pointer;
      }
      .vtree-row input {
        width: auto;
        flex: 0 0 auto;
        margin: 0;
      }
      .vtree-icon {
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--icon-tertiary);
        flex: 0 0 auto;
      }
      .vtree-name {
        min-width: 0;
        flex: 1;
        font-size: var(--body-sm-font-size);
        font-weight: var(--font-weight-medium);
        color: var(--text-default);
      }
      .vtree-count {
        flex: 0 0 auto;
        color: var(--text-tertiary);
        font-size: var(--body-xs-font-size);
        font-family: var(--code-editor-font-family);
      }
      .vtree-folder { display: flex; flex-direction: column; gap: var(--spacer-6); }
      .vtree-row--folder { background: rgba(15, 23, 42, 0.03); }
      .vtree-children {
        display: flex;
        flex-direction: column;
        gap: var(--spacer-6);
        padding-left: var(--spacer-16);
        margin-left: var(--spacer-10);
        border-left: 1px dashed var(--border-neutral-l2);
      }
      .vtree-empty {
        padding: var(--spacer-6) var(--spacer-10);
        color: var(--text-tertiary);
        font-size: var(--body-xs-font-size);
      }

      .version-actions { display: flex; justify-content: flex-end; gap: var(--spacer-8); margin-top: var(--spacer-8); }

      .version-card {
        display: flex; flex-direction: column; gap: var(--spacer-10);
        padding: var(--spacer-16); border: 1px solid var(--border-neutral-l1); border-radius: var(--radius-8);
        background: var(--bg-base-secondary);
        transition: border-color 0.12s ease, box-shadow 0.12s ease;
      }
      .version-card:hover {
        border-color: var(--border-neutral-l2);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
      }
      .version-card-main { display: flex; align-items: flex-start; gap: var(--spacer-8); }
      .version-card-copy { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: var(--spacer-6); }
      .version-card strong { font-size: var(--body-base-font-size); font-weight: var(--font-weight-medium); display: block; }
      .version-card-desc { color: var(--text-tertiary); font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .version-card-meta { display: flex; align-items: center; gap: var(--spacer-8); margin-top: var(--spacer-2); }
      .version-card-tag { display: inline-flex; align-items: center; height: 18px; padding: 0 var(--spacer-6); border-radius: var(--radius-full); background: var(--bg-overlay-l1); color: var(--text-tertiary); font-size: 11px; }
      .version-card-link {
        display: inline-flex;
        max-width: 100%;
        color: var(--text-brand);
        font-size: var(--body-xs-font-size);
        line-height: var(--body-xs-line-height);
        text-decoration: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .version-card-link:hover { text-decoration: underline; }
      .version-card-actions { display: flex; flex-wrap: wrap; gap: var(--spacer-8); padding-top: var(--spacer-10); border-top: 1px solid var(--border-neutral-l1); }

      .tool-button {
        height: 28px; padding: 0 var(--spacer-12);
        display: inline-flex; align-items: center; gap: var(--spacer-6);
        border: 1px solid var(--border-neutral-l1); border-radius: var(--radius-8);
        background: var(--bg-base-default); color: var(--text-default); cursor: pointer;
        font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height);
        transition: background 0.12s ease, border-color 0.12s ease;
      }
      .tool-button:hover { background: var(--bg-overlay-l1); border-color: var(--border-neutral-l2); }
      .tool-button:disabled { opacity: 0.56; cursor: not-allowed; }
      .tool-button.active { background: var(--bg-invert); color: var(--text-white); border-color: var(--bg-invert); }
      .tool-button.danger-button { color: var(--status-error-default); border-color: var(--status-error-surface-l2); }
      .tool-button.danger-button:hover { background: var(--status-error-surface-l1); }
      .tool-button.publish-button { color: var(--status-success-default); border-color: rgba(64, 176, 139, 0.32); }
      .tool-button.publish-button:hover { background: var(--status-success-surface-l1); }
      .tool-button.publish-button:disabled { opacity: 0.5; cursor: not-allowed; }
      .tool-button.version-link-button { color: var(--text-brand); border-color: var(--border-neutral-l2); }
      .tool-button.version-update-button { color: var(--text-default); border-color: var(--border-neutral-l2); }

      .version-card-published {
        display: inline-flex; align-items: center; gap: var(--spacer-4);
        font-size: var(--body-xs-font-size); color: var(--status-success-default);
      }
      .version-card-published::before {
        content: ""; width: 5px; height: 5px; border-radius: 50%;
        background: var(--status-success-default); flex-shrink: 0;
      }

      /* ===== Version preview header badge ===== */
      .version-preview-badge {
        display: none;
        align-items: center;
        gap: var(--spacer-8);
        min-width: 0;
      }
      .version-preview-badge.is-visible { display: flex; }
      .version-preview-name {
        font-size: var(--body-sm-font-size);
        font-weight: var(--font-weight-medium);
        color: var(--text-default);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 240px;
      }
      .version-preview-tag {
        flex-shrink: 0;
        display: inline-flex; align-items: center;
        height: 20px; padding: 0 var(--spacer-8);
        border-radius: var(--radius-full);
        background: var(--bg-overlay-l2);
        color: var(--text-tertiary);
        font-size: 11px;
        white-space: nowrap;
      }

      /* ===== Design system view (TraeWork UI Kit) ===== */
      .ds-page { display: flex; flex-direction: column; gap: 0; height: 100%; overflow: hidden; background: transparent; }

      .ds-topbar {
        height: 48px; min-height: 48px;
        display: flex; align-items: center; justify-content: space-between; gap: var(--spacer-16);
        padding: 0 var(--spacer-20);
        border-bottom: 1px solid var(--border-neutral-l1);
        background: var(--bg-base-default);
      }
      .ds-topbar-left, .ds-topbar-right { display: flex; align-items: center; gap: var(--spacer-12); min-width: 0; }
      .ds-topbar-center { flex: 1; display: flex; justify-content: center; min-width: 0; }
      .ds-brand { display: flex; align-items: center; gap: var(--spacer-12); min-width: 0; }
      .ds-brand-copy { display: flex; align-items: center; gap: var(--spacer-8); min-width: 0; }
      .ds-brand-title {
        font-size: 15px;
        line-height: 1;
        font-weight: var(--font-weight-strong);
        color: var(--text-default);
        letter-spacing: -0.01em;
        white-space: nowrap;
      }
      .ds-brand-meta {
        display: inline-flex;
        align-items: center;
        min-height: 20px;
        padding: 0 var(--spacer-8);
        border-radius: var(--radius-full);
        background: var(--bg-base-secondary);
        color: var(--text-tertiary); font-size: var(--body-xs-font-size); line-height: 1;
        white-space: nowrap;
      }

      .ds-tab-bar {
        display: inline-flex;
        gap: var(--spacer-4);
        padding: var(--spacer-3);
        background: var(--bg-base-secondary);
        border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-8);
      }
      .ds-tab-btn {
        height: 28px; padding: 0 var(--spacer-12); border: 0; border-radius: var(--radius-6);
        background: transparent; color: var(--text-secondary); cursor: pointer;
        font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height); font-weight: var(--font-weight-medium);
        transition: background 0.12s ease, color 0.12s ease;
      }
      .ds-tab-btn:hover { color: var(--text-default); }
      .ds-tab-btn.active { background: var(--bg-base-default); color: var(--text-default); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

      .ds-export-btn {
        height: 28px; padding: 0 var(--spacer-12);
        display: inline-flex; align-items: center; gap: var(--spacer-6);
        border: 1px solid var(--border-neutral-l1); border-radius: var(--radius-8);
        background: var(--bg-base-default); color: var(--text-default); cursor: pointer;
        font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height);
      }
      .ds-export-btn:hover { background: var(--bg-overlay-l1); }
      .ds-export-btn svg { display: block; }

      .ds-workbench {
        display: grid; grid-template-columns: minmax(0, 1.65fr) minmax(280px, 0.72fr);
        gap: var(--spacer-16); min-width: 0;
        padding: var(--spacer-16);
      }
      .ds-main-column, .ds-side-column { display: flex; flex-direction: column; gap: var(--spacer-16); min-width: 0; }
      .ds-panel {
        border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-12);
        background: var(--bg-base-default);
        overflow: hidden;
      }
      .ds-panel-head {
        display: flex; align-items: center; justify-content: space-between; gap: var(--spacer-12);
        padding: var(--spacer-14) var(--spacer-16);
        border-bottom: 1px solid var(--border-neutral-l1);
      }
      .ds-panel-head strong {
        color: var(--text-default);
        font-size: var(--body-base-font-size);
        line-height: var(--body-base-line-height);
        font-weight: var(--font-weight-strong);
      }
      .ds-panel-head span {
        color: var(--text-tertiary);
        font-size: var(--body-xs-font-size);
        line-height: var(--body-xs-line-height);
      }
      .ds-panel-body { padding: var(--spacer-16); }

      .ds-hero-body {
        display: flex; align-items: flex-start; justify-content: space-between; gap: var(--spacer-20);
        padding: var(--spacer-20);
      }
      .ds-hero-copy { max-width: 720px; display: grid; gap: var(--spacer-12); }
      .ds-hero-eyebrow {
        display: inline-flex; align-items: center; gap: var(--spacer-6);
        color: var(--text-tertiary); font-size: var(--body-xs-font-size); line-height: var(--body-xs-line-height);
        text-transform: uppercase; letter-spacing: 0.08em;
      }
      .ds-hero-title {
        margin: 0; color: var(--text-default);
        font-size: var(--heading-xl-font-size); line-height: var(--heading-xl-line-height); font-weight: var(--font-weight-strong);
      }
      .ds-hero-desc {
        margin: 0; color: var(--text-secondary);
        font-size: var(--body-base-font-size); line-height: var(--body-base-line-height);
      }
      .ds-chip-row { display: flex; flex-wrap: wrap; gap: var(--spacer-8); }
      .ds-chip {
        display: inline-flex; align-items: center; gap: var(--spacer-6);
        min-height: 28px; padding: 0 var(--spacer-10);
        border: 1px solid var(--border-neutral-l1); border-radius: var(--radius-full);
        background: var(--bg-base-default); color: var(--text-secondary);
        font-size: var(--body-xs-font-size); line-height: var(--body-xs-line-height);
      }
      .ds-chip.brand {
        border-color: color-mix(in srgb, var(--bg-brand) 16%, var(--border-neutral-l1));
        color: var(--text-default);
      }
      .ds-hero-meta { min-width: 240px; display: grid; gap: var(--spacer-12); }
      .ds-meta-card {
        padding: var(--spacer-16); border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-12); background: var(--bg-base-secondary);
      }
      .ds-meta-card strong {
        display: block; margin-bottom: var(--spacer-6); color: var(--text-default);
        font-size: var(--body-base-font-size); line-height: var(--body-base-line-height);
      }
      .ds-meta-card p {
        margin: 0; color: var(--text-secondary);
        font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height);
      }

      .ds-kpi-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--spacer-12); }
      .ds-kpi-card {
        padding: var(--spacer-16); border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-12); background: var(--bg-base-default);
      }
      .ds-kpi-label { display: block; color: var(--text-tertiary); font-size: var(--body-xs-font-size); line-height: var(--body-xs-line-height); }
      .ds-kpi-value {
        display: block; margin-top: var(--spacer-8); color: var(--text-default);
        font-family: var(--font-family-metric); font-size: var(--heading-lg-font-size);
        line-height: var(--heading-lg-line-height); font-weight: var(--font-weight-strong);
      }
      .ds-kpi-meta { display: block; margin-top: var(--spacer-6); color: var(--text-secondary); font-size: var(--body-xs-font-size); line-height: var(--body-xs-line-height); }

      .ds-section { margin: 0; border: 1px solid var(--border-neutral-l1); border-radius: var(--radius-12); overflow: hidden; background: var(--bg-base-default); }
      .ds-section-head {
        display: flex; align-items: center; justify-content: space-between; gap: var(--spacer-12);
        padding: var(--spacer-12) var(--spacer-16); border-bottom: 1px solid var(--border-neutral-l1);
        background: var(--bg-base-secondary);
      }
      .ds-section-head span { font-size: var(--body-base-font-size); font-weight: var(--font-weight-strong); }
      .ds-scale { display: grid; grid-template-columns: repeat(auto-fit, minmax(96px, 1fr)); }
      .ds-swatch { display: flex; flex-direction: column; justify-content: flex-end; gap: var(--spacer-2); padding: var(--spacer-14) var(--spacer-12); min-height: 96px; }
      .ds-swatch strong { font-size: var(--body-xs-font-size); font-weight: var(--font-weight-strong); }
      .ds-swatch span { font-size: var(--body-xs-font-size); font-family: var(--code-editor-font-family); }

      .ds-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--spacer-12); padding: 0; }
      .ds-card { padding: var(--spacer-16); border: 1px solid var(--border-neutral-l1); border-radius: var(--radius-12); background: var(--bg-base-default); }
      .ds-card h3 { margin: 0 0 var(--spacer-8); font-size: var(--heading-xs-font-size); line-height: var(--heading-xs-line-height); font-weight: var(--font-weight-strong); }
      .ds-card p { margin: 0; color: var(--text-secondary); font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height); }

      .ds-list { display: grid; gap: var(--spacer-10); }
      .ds-list-item {
        display: flex; align-items: flex-start; justify-content: space-between; gap: var(--spacer-12);
        padding: var(--spacer-12) 0; border-bottom: 1px solid var(--border-neutral-l1);
      }
      .ds-list-item:last-child { padding-bottom: 0; border-bottom: 0; }
      .ds-list-copy { min-width: 0; }
      .ds-list-copy strong {
        display: block; color: var(--text-default);
        font-size: var(--body-base-font-size); line-height: var(--body-base-line-height); font-weight: var(--font-weight-medium);
      }
      .ds-list-copy p { margin: var(--spacer-4) 0 0; color: var(--text-secondary); font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height); }
      .ds-list-badge {
        flex: 0 0 auto; padding: 0 var(--spacer-8); border-radius: var(--radius-full);
        background: var(--bg-overlay-l1); color: var(--text-tertiary);
        font-size: var(--body-xs-font-size); line-height: 22px;
      }

      .ds-note-list { display: grid; gap: var(--spacer-10); }
      .ds-note-item {
        padding: var(--spacer-12); border: 1px solid var(--border-neutral-l1);
        border-radius: var(--radius-12); background: var(--bg-base-secondary);
      }
      .ds-note-item strong {
        display: block; margin-bottom: var(--spacer-4); color: var(--text-default);
        font-size: var(--body-base-font-size); line-height: var(--body-base-line-height);
      }
      .ds-note-item p { margin: 0; color: var(--text-secondary); font-size: var(--body-sm-font-size); line-height: var(--body-sm-line-height); }

      @media (max-width: 1120px) {
        .ds-workbench { grid-template-columns: minmax(0, 1fr); }
        .ds-hero-body { flex-direction: column; }
        .ds-hero-meta { min-width: 0; width: 100%; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      }

      @media (max-width: 820px) {
        .ds-topbar-center { justify-content: flex-start; }
        .ds-tab-bar { max-width: 100%; overflow: auto; }
        .ds-kpi-grid { grid-template-columns: 1fr; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { transition: none !important; }
      }

      /* ===== Toast ===== */
      #toast-container {
        position: fixed; bottom: var(--spacer-24); left: 50%; transform: translateX(-50%);
        display: flex; flex-direction: column; align-items: center; gap: var(--spacer-8);
        z-index: 9000; pointer-events: none;
      }
      .toast-item {
        padding: var(--spacer-8) var(--spacer-16); border-radius: var(--radius-full);
        background: rgba(17, 24, 39, 0.88); color: #fff;
        font-size: var(--body-sm-font-size); backdrop-filter: blur(8px);
        opacity: 1; transition: opacity 0.3s; white-space: nowrap;
      }
      .toast-item.fade-out { opacity: 0; }

      /* ===== Page edit modal ===== */
      .page-edit-panel {
        background: var(--bg-base-default); border: 1px solid var(--border-neutral-l2);
        border-radius: var(--radius-12); box-shadow: 0 16px 48px rgba(0,0,0,0.2);
        width: 600px; max-width: calc(100vw - 48px); max-height: calc(100vh - 80px);
        display: flex; flex-direction: column; overflow: hidden;
      }
      .page-edit-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: var(--spacer-16) var(--spacer-20); border-bottom: 1px solid var(--border-neutral-l1);
        flex-shrink: 0;
      }
      .page-edit-head h3 { margin: 0; font-size: var(--body-base-font-size); font-weight: var(--font-weight-strong); color: var(--text-default); }
      .page-edit-head-actions { display: flex; gap: var(--spacer-8); }
      .page-edit-body { flex: 1; min-height: 0; overflow-y: auto; padding: var(--spacer-20); display: flex; flex-direction: column; gap: var(--spacer-16); }
      .page-edit-field { display: flex; flex-direction: column; gap: var(--spacer-6); }
      .page-edit-field label { font-size: var(--body-sm-font-size); font-weight: var(--font-weight-medium); color: var(--text-secondary); }
      .page-edit-field input, .page-edit-field textarea {
        width: 100%; box-sizing: border-box; padding: var(--spacer-8) var(--spacer-10);
        border: 1px solid var(--border-neutral-l2); border-radius: var(--radius-6);
        background: var(--bg-base-default); font-size: var(--body-sm-font-size);
        color: var(--text-default); outline: none; resize: vertical;
        font-family: var(--code-editor-font-family); line-height: 1.6;
      }
      .page-edit-field input { height: 32px; resize: none; font-family: inherit; }
      .page-edit-field input:focus, .page-edit-field textarea:focus { border-color: var(--border-contrast); }
      .page-edit-field .field-hint { font-size: var(--body-xs-font-size); color: var(--text-tertiary); margin-top: var(--spacer-2); }
      .page-edit-meta { display: flex; gap: var(--spacer-6); flex-wrap: wrap; }
      .page-edit-meta-tag {
        padding: 0 var(--spacer-8); height: 22px; border-radius: var(--radius-full);
        background: var(--bg-overlay-l1); font-size: var(--body-xs-font-size);
        color: var(--text-tertiary); display: inline-flex; align-items: center;
        font-family: var(--code-editor-font-family);
      }
      .page-edit-footer {
        display: flex; justify-content: flex-end; gap: var(--spacer-8);
        padding: var(--spacer-12) var(--spacer-20); border-top: 1px solid var(--border-neutral-l1);
        flex-shrink: 0;
      }

    </style>
  </head>
  <body>
    <div class="shell" id="shell">
      <aside class="side">
        <div class="side-header">
          <button class="project-trigger" id="project-trigger" type="button" title="双击重命名项目">
            <span class="project-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="2.6" y="2.6" width="18.8" height="18.8" rx="5.6" fill="currentColor" opacity="0.15"></rect>
                <rect x="4.8" y="6" width="14.4" height="3.2" rx="1.6" fill="currentColor"></rect>
                <rect x="4.8" y="10.2" width="10.6" height="3.2" rx="1.6" fill="currentColor"></rect>
                <rect x="4.8" y="14.4" width="14.4" height="3.2" rx="1.6" fill="currentColor"></rect>
              </svg>
            </span>
            <span class="project-copy">
              <span class="project-name" id="project-name">项目名称</span>
              <span class="project-subtitle hidden" id="project-subtitle"></span>
              <input class="project-name-input hidden" id="project-name-input" type="text" aria-label="项目名称" />
            </span>
          </button>
        </div>
        <div class="side-scroll">
          <div id="nav"></div>
        </div>
      </aside>
      <main class="main">
        <header class="main-header" id="main-header">
          <div class="main-header-left">
            <button class="main-toggle-btn" id="sidebar-toggle" type="button" title="展开/收起侧边栏"></button>
            <div class="version-preview-badge" id="version-preview-badge">
              <span class="version-preview-name" id="version-preview-name"></span>
              <span class="version-preview-tag" id="version-preview-tag">版本预览</span>
            </div>
            <div class="device-switch" id="device-switch">
              <button class="device-switch-trigger" id="device-trigger" type="button" aria-haspopup="menu" aria-expanded="false"></button>
              <div class="device-switch-menu hidden" id="device-menu" role="menu" aria-label="设备切换">
                <button class="device-switch-option" data-device-option="desktop" type="button" role="menuitem">桌面端</button>
                <button class="device-switch-option" data-device-option="mobile" type="button" role="menuitem">移动端</button>
              </div>
            </div>
