            </section>
          </aside>
        `;
      }

      function getPalette(baseColor, label) {
        const steps = [0.9, 0.78, 0.62, 0.45, 0.25, -0.08, -0.18, -0.3, -0.4, -0.48];
        const tokens = ["50", "100", "200", "300", "400", "500", "600", "700", "800", "900"];
        return tokens.map((token, index) => ({
          token,
          name: `${label}-${token}`,
          hex: mixColor(baseColor, steps[index])
        }));
      }

      function mixColor(hex, amount) {
        const normalized = hex.replace("#", "");
        const r = parseInt(normalized.slice(0, 2), 16);
        const g = parseInt(normalized.slice(2, 4), 16);
        const b = parseInt(normalized.slice(4, 6), 16);
        const target = amount >= 0 ? 255 : 0;
        const factor = Math.abs(amount);
        const next = (value) => Math.max(0, Math.min(255, Math.round(value + (target - value) * factor)));
        return `#${[next(r), next(g), next(b)].map((value) => value.toString(16).padStart(2, "0")).join("")}`;
      }

      function renderThemeSection(title, palette) {
        const headColor = palette[5].hex;
        const textColor = isDarkColor(headColor) ? "#ffffff" : "#0f172a";
        const swatches = palette.slice().reverse().map((item) => `
          <div class="ds-swatch" style="background:${item.hex}; color:${isDarkColor(item.hex) ? "#ffffff" : "#0f172a"};">
            <strong>${escapeHtml(item.name)}</strong>
            <span>${escapeHtml(item.hex)}</span>
          </div>
        `).join("");

        return `
          <section class="ds-section">
            <div class="ds-section-head" style="background:${headColor}; color:${textColor};">
              <span>${escapeHtml(title)}</span>
              <span>${svg("palette", textColor, 16)}</span>
            </div>
            <div class="ds-scale">${swatches}</div>
          </section>
        `;
      }

      function isDarkColor(hex) {
        const normalized = hex.replace("#", "");
        const r = parseInt(normalized.slice(0, 2), 16);
        const g = parseInt(normalized.slice(2, 4), 16);
        const b = parseInt(normalized.slice(4, 6), 16);
        const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        return luminance < 0.58;
      }

      function renderWorkbenchList(items) {

      // 工作流视图（第 3 期）：只读引导，横向泳道渲染四大块 + 贯穿层 + 回环，数据来自
      // manifest.capabilities（按 block 首字符 ①②③④ 分组）。能在 Shell 内直达的做真跳转
      // （设计系统 tab / 技能库 tab / 版本管理弹窗），具体技能触发与文档仍是引导文字。
      function renderWorkflowView() {
        const capabilities = Array.isArray(manifest.capabilities) ? manifest.capabilities : [];
        const ORDER = ["①", "②", "③", "④"];
        const BLOCK_TITLES = { "①": "需求对齐", "②": "原型设计", "③": "PRD 输出", "④": "版本管理" };
        const supportLabel = (support) => (support === "full" ? "完整" : "待补");
        const chip = (text, kind) => `<span class="wf-chip wf-chip--${kind}">${escapeHtml(text)}</span>`;

        const renderCap = (cap) => {
          const skills = Array.isArray(cap.skills) ? cap.skills : [];
          const commands = Array.isArray(cap.commands) ? cap.commands : [];
          const chips = [...skills.map((s) => chip(s, "skill")), ...commands.map((c) => chip(c, "cmd"))].join("");
          return `
            <div class="wf-cap">
              <div class="wf-cap-top">
                <span class="wf-cap-block">${escapeHtml(cap.block || "")}</span>
                <span class="wf-cap-name">${escapeHtml(cap.name || "")}</span>
                <span class="wf-support wf-support--${cap.support === "full" ? "full" : "partial"}">${supportLabel(cap.support)}</span>
              </div>
              <div class="wf-io">
                <span class="wf-io-cell"><em>输入</em>${escapeHtml(cap.inputs || "—")}</span>
                <span class="wf-io-sep">→</span>
                <span class="wf-io-cell"><em>产出</em>${escapeHtml(cap.outputs || "—")}</span>
              </div>
              ${chips ? `<div class="wf-chips">${chips}</div>` : ""}
              ${cap.defaultChannel ? `<div class="wf-default">默认通道 · ${escapeHtml(cap.defaultChannel)}</div>` : ""}
            </div>
          `;
        };

        const blocksHtml = ORDER
          .map((key) => {
            const caps = capabilities.filter((cap) => String(cap.block || "")[0] === key);
            if (!caps.length) return "";
            const jumps = [];
            if (key === "②") jumps.push({ action: "design-system", label: "打开设计系统" });
            if (key === "④") jumps.push({ action: "versions", label: "打开版本管理" });
            if (caps.some((cap) => (Array.isArray(cap.skills) ? cap.skills.length : 0))) {
              jumps.push({ action: "skills", label: "在技能库查看" });
            }
            const jumpsHtml = jumps
              .map((jump) => `<button type="button" class="wf-jump" data-workflow-action="${jump.action}">${escapeHtml(jump.label)} →</button>`)
              .join("");
            return `
              <div class="wf-block">
                <div class="wf-block-head">
                  <span class="wf-block-key">${key}</span>
                  <span class="wf-block-title">${escapeHtml(BLOCK_TITLES[key] || "")}</span>
                </div>
                <div class="wf-block-caps">${caps.map(renderCap).join("")}</div>
                ${jumpsHtml ? `<div class="wf-block-jumps">${jumpsHtml}</div>` : ""}
              </div>
            `;
          })
          .filter(Boolean)
          .join(`<div class="wf-arrow" aria-hidden="true">→</div>`);

        return `
          <section class="live-preview-shell wf-shell">
            <div class="wf-scroll">
              <div class="wf-view">
                <header class="wf-head">
                  <h1>工作流</h1>
                  <p>掌图给产品经理开箱的一条主线：需求 → 原型 → PRD → 版本，四大块之间有回环。此页只做引导，不直接触发 AI。</p>
                </header>
                <div class="wf-layer">
                  <span class="wf-layer-tag">贯穿层</span>
                  <div class="wf-layer-body">
                    <strong>需求锚点</strong>
                    <span>把「需求」钉在「原型」上，同时是 PRD 的数据来源。需求源在全局 <code>src/requirements/</code>，页面用 <code>data-zhangtu-requirement-anchor</code> + <code>ref</code> 引用。</span>
                  </div>
                </div>
                <div class="wf-lane">${blocksHtml}</div>
                <div class="wf-loop">
                  <span class="wf-loop-icon">↺</span>
                  <span><strong>评审反馈 / 需求变更</strong>：④ 版本管理评审出的反馈会回到 ① 需求对齐或 ②c 原型修改 —— 四大块不是瀑布，是有回环的。</span>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function attachWorkflowEvents() {
        const stage = document.getElementById("main-stage");
        if (!stage) return;
        stage.querySelectorAll("[data-workflow-action]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const action = btn.getAttribute("data-workflow-action");
            if (action === "skills") setActiveMenu("zhangtu-skills");
            else if (action === "design-system") setActiveMenu("zhangtu-design-system");
            else if (action === "versions") openVersionModal();
          });
        });
      }

      function renderContent() {
        const mainStageEl = document.getElementById("main-stage");
        if (state.activeMenu === "zhangtu-workflow") {
          mainStageEl.innerHTML = renderWorkflowView();
          attachWorkflowEvents();
          return;
        }
        if (state.activeMenu === "zhangtu-skills") {
          if (skillsPage) {
            mainStageEl.innerHTML = `
              <section class="live-preview-shell">
                <div class="frame-layout" id="frame-layout">
                  <div class="frame-wrap desktop" id="frame-wrap">
                    <iframe id="page-frame" src="${escapeHtml(skillsPage.directPagePath)}" title="技能管理"></iframe>
                  </div>
                </div>
              </section>

            mainStageEl.innerHTML = `<div class="empty-state">技能页面未找到，请检查 src/pages/skills/ 目录。</div>`;
          }
          return;
        }

        if (state.activeMenu === "zhangtu-design-system") {
          if (designSystemPage) {
            mainStageEl.innerHTML = `
              <section class="live-preview-shell">
                <div class="frame-layout" id="frame-layout">
                  <div class="frame-wrap desktop" id="frame-wrap">
                    <iframe id="page-frame" src="${escapeHtml(designSystemPage.directPagePath)}" title="设计系统"></iframe>
                  </div>
                </div>
              </section>

      function attachLivePageEvents(page) {
        const iframe = document.getElementById("page-frame");
        if (!iframe) {
          return;
        }

        const bindIframeInteractions = () => {
          const doc = iframe.contentDocument;
          if (!doc) {
            return;
          }

          if (!doc.getElementById("zhangtu-requirement-highlight-style")) {
            const style = doc.createElement("style");
            style.id = "zhangtu-requirement-highlight-style";
            style.textContent = `
              .zhangtu-anchor-active {
                outline: 2px solid rgba(37, 99, 235, 0.42);
                outline-offset: 4px;
                border-radius: 10px;
              }
              .zhangtu-badge-active {
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
              }
            `;
            doc.head.appendChild(style);
          }

          syncIframeRequirementSelection();
          // hydrate 和 editor panel 状态由 BRIDGE_READY 响应时统一推送，避免 React 尚未挂载时消息丢失
        };

        iframe.addEventListener("load", bindIframeInteractions);
        if (iframe.contentDocument && iframe.contentDocument.readyState === "complete") {
          bindIframeInteractions();
        }
        if (supportsAuxiliaryMenus()) {
          attachRequirementsSidebarEvents();
        }
      }

      function syncIframeRequirementSelection() {
        const iframe = document.getElementById("page-frame");
        const doc = iframe && iframe.contentDocument;
        if (!doc) {
          return;
        }

        const activeAnchor = state.activeRequirementAnchor;
        doc.querySelectorAll("[data-zhangtu-requirement-marker='true']").forEach((node) => {
          const markerAnchor = node.getAttribute("data-zhangtu-requirement-anchor") || node.getAttribute("data-zhangtu-requirement-id");
          node.classList.toggle("zhangtu-badge-active", Boolean(activeAnchor && markerAnchor === activeAnchor));
        });

        doc.querySelectorAll("[data-zhangtu-requirement-anchor]").forEach((node) => {
          const anchor = node.getAttribute("data-zhangtu-requirement-anchor");
          node.classList.toggle("zhangtu-anchor-active", Boolean(activeAnchor && anchor === activeAnchor));
        });
      }

      function scrollRequirementAnchorIntoView(anchorId) {
        const iframe = document.getElementById("page-frame");
        const doc = iframe && iframe.contentDocument;
        if (!doc || !anchorId) {
          return;
        }
        const target = doc.querySelector(`[data-zhangtu-requirement-anchor="${CSS.escape(anchorId)}"]`);
        if (!target) {
          return;
        }
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        syncIframeRequirementSelection();
      }

      function openRequirementByAnchor(anchorId, options = {}) {
        const page = getActivePage();
        const requirements = getRequirementsForPage(page);
        if (!page || !requirements.length) {
          return;
        }
        const matched = requirements.find((item) => item.anchorId === anchorId || item.id === anchorId) || requirements[0];
        state.activeRequirementAnchor = matched.anchorId || matched.id;
        const shouldOpenPanel = options.openPanel !== false;
        state.isRequirementsDrawerOpen = shouldOpenPanel;
        if (shouldOpenPanel) {
          state.isPageEditorOpen = false;
        }
        updateMainHeader();
        updateRequirementsState();
        refreshRequirementsSidebar();
        scrollRequirementAnchorIntoView(state.activeRequirementAnchor);
        postRequirementsToFrame(page, state.activeRequirementAnchor, options.presentation || "popup");
      }

      function openRequirementEditorByAnchor(anchorId) {
        const page = getActivePage();
        const requirements = getRequirementsForPage(page);
        if (!page || !requirements.length) {
          return;
        }
        const matched = requirements.find((item) => item.anchorId === anchorId || item.id === anchorId) || requirements[0];
        state.activeRequirementAnchor = matched.anchorId || matched.id;
        state.isRequirementsDrawerOpen = true;
        state.isPageEditorOpen = false;
        updateMainHeader();
        updateRequirementsState();
        refreshRequirementsSidebar();
        scrollRequirementAnchorIntoView(state.activeRequirementAnchor);

        const iframe = document.getElementById("page-frame");
        if (iframe && iframe.contentWindow) {
          iframe.contentWindow.postMessage({
            type: "zhangtu:requirements-edit",
            anchorId: state.activeRequirementAnchor,
          }, "*");
        }
      }

      window.openRequirementByAnchor = openRequirementByAnchor;

      function attachStaticEvents() {
        window.addEventListener("message", handleRequirementBridgeMessage);
        document.getElementById("sidebar-toggle").addEventListener("click", () => {
          if (isIterationPreview()) {
            goBackToProject();
            return;
          }
          toggleSidebar();
        });
        const projectTrigger = document.getElementById("project-trigger");
        const projectNameInput = document.getElementById("project-name-input");
        document.getElementById("requirements-toggle").addEventListener("click", () => {
          if (isIterationPreview()) {
            editCurrentVersion();
            return;
          }
          const page = getActivePage();
          if (!page || !getRequirementsForPage(page).length) {
            showToast("当前页面暂无备注");

          state.isRequirementsDrawerOpen = !state.isRequirementsDrawerOpen;
          if (state.isRequirementsDrawerOpen) {
            state.isPageEditorOpen = false;
          }
          updateMainHeader();
          updateRequirementsState();
          postPageEditorPanelState(false);
          if (state.isRequirementsDrawerOpen) {
            postRequirementsToFrame(page, state.activeRequirementAnchor, "panel");
          }
          postRequirementPanelState(state.isRequirementsDrawerOpen);
          refreshRequirementsSidebar();
        });
        document.getElementById("page-editor-toggle").addEventListener("click", () => {
          if (isIterationPreview()) {
            publishCurrentVersion();
            return;
          }
          const page = getActivePage();
          if (!page) {
            return;
          }
          state.isPageEditorOpen = !state.isPageEditorOpen;
          if (state.isPageEditorOpen) {
            state.isRequirementsDrawerOpen = false;
          }
          updateMainHeader();
          updateRequirementsState();
          postPageEditorPanelState(state.isPageEditorOpen);
          refreshRequirementsSidebar();
        });
        document.getElementById("refresh-page").addEventListener("click", () => {
          if (isIterationPreview()) {
            deleteCurrentVersion();
            return;
          }
          const iframe = document.getElementById("page-frame");
          if (iframe) {
            iframe.src = iframe.src;
          }
        });
        const deviceTrigger = document.getElementById("device-trigger");
        const deviceMenu = document.getElementById("device-menu");
        deviceTrigger.addEventListener("click", (event) => {
          event.stopPropagation();
          state.isDeviceMenuOpen = !state.isDeviceMenuOpen;
          updateDeviceSwitch();
        });
        deviceMenu.querySelectorAll("[data-device-option]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            setDevice(button.getAttribute("data-device-option"));
          });
        });
        document.addEventListener("click", () => {
          if (!state.isDeviceMenuOpen) {
            return;
          }
          state.isDeviceMenuOpen = false;
          updateDeviceSwitch();
        });

        if (!isIterationPreview()) {
          projectTrigger.addEventListener("dblclick", (event) => {
            event.preventDefault();
            startProjectRename();
          });
        }
        projectNameInput.addEventListener("click", (event) => {
          event.stopPropagation();
        });
        projectNameInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            finishProjectRename(true);
          } else if (event.key === "Escape") {
            event.preventDefault();
            finishProjectRename(false);
          }
        });
        projectNameInput.addEventListener("blur", () => finishProjectRename(true));
      }

      function getCurrentVersionScope() {
        return isIterationPreview() && manifest.scope?.id ? manifest.scope : null;
      }

      function goBackToProject() {
        window.location.href = "/";
      }

      function editCurrentVersion() {
        const scope = getCurrentVersionScope();
        if (!scope) {
          return;
        }
        fillVersionForm({
          id: scope.id,
          name: scope.name || scope.title || manifest.title || "",
          description: scope.description || "",
          pageIds: Array.isArray(scope.pageIds) ? scope.pageIds.slice() : pages.map((page) => page.id),
        });
      }

      function openCurrentVersionShareLink() {
        const scope = getCurrentVersionScope();
        const shareUrl = getPublishedShareUrl(scope);
        if (!shareUrl) {
          openVersionModal();
          return;
        }
        window.open(shareUrl, "_blank", "noopener,noreferrer");
        showToast(`已打开发布链接：${shareUrl}`, 2400);
      }

      async function publishCurrentVersion() {
        const scope = getCurrentVersionScope();
        if (!scope) {
          return;
        }
        const shareUrl = getPublishedShareUrl(scope);
        const button = document.getElementById("page-editor-toggle");
        await publishVersion({
          id: scope.id,
          isPublished: Boolean(scope.publishedAt || shareUrl),

          publishedMeta: scope.publishedMeta,
        }, button, { updateExisting: Boolean(shareUrl) });
      }

      async function deleteCurrentVersion() {
        const scope = getCurrentVersionScope();
        if (!scope) {
          return;
        }
        await deleteVersion(scope.id, { redirectToProject: true });
      }

      document.getElementById("version-button").addEventListener("click", () => {
        if (isIterationPreview()) {
          openCurrentVersionShareLink();
          return;
        }
        openVersionModal();
      });
      document.getElementById("version-editor-close").addEventListener("click", closeVersionModal);
      document.getElementById("version-list-close").addEventListener("click", closeVersionModal);
      document.getElementById("version-create").addEventListener("click", () => {
        resetVersionForm();
        openVersionEditorModal();
      });
      document.getElementById("version-reset").addEventListener("click", resetVersionForm);
      document.getElementById("publish-config-close").addEventListener("click", closePublishConfigModal);
      document.getElementById("publish-config-cancel").addEventListener("click", closePublishConfigModal);
      versionEditorModalEl.addEventListener("click", (event) => {
        if (event.target === versionEditorModalEl) {
          closeVersionModal();
        }
      });
      versionListModalEl.addEventListener("click", (event) => {
        if (event.target === versionListModalEl) {
          closeVersionModal();
        }
      });
      publishConfigModalEl.addEventListener("click", (event) => {
        if (event.target === publishConfigModalEl) {
          closePublishConfigModal();
        }
      });
      versionFormEl.addEventListener("submit", saveVersion);
      publishConfigFormEl.addEventListener("submit", savePublishConfigAndContinue);

      function openVersionModal() {
        versionListModalEl.classList.remove("hidden");
        loadVersions();
      }

      function openVersionEditorModal(selectedIds) {
        versionListModalEl.classList.add("hidden");
        versionEditorModalEl.classList.remove("hidden");
        loadProjectVersionCatalog().then(() => {
          renderVersionPageChecks(Array.isArray(selectedIds) ? selectedIds : Array.from(versionPageChecksEl.querySelectorAll("input:checked")).map((item) => item.value));
        });
      }

      function closeVersionModal() {
        versionEditorModalEl.classList.add("hidden");
        versionListModalEl.classList.add("hidden");
      }

      function getPublishConfigReason(status, errorMessage) {
        const missingSystemName = !String(status?.systemName || "").trim();
        const missingToken = !status?.token?.configured;
        if (missingSystemName && missingToken) {
          return "both";
        }
        if (errorMessage && String(errorMessage).includes("系统名称")) {
          return "systemName";
        }
        if (missingSystemName) {
          return "systemName";
        }
        return "token";
      }

      function shouldPromptPublishConfig(status) {
        return !status?.token?.configured || !String(status?.systemName || "").trim();
      }

      function shouldRecoverPublishConfig(errorMessage) {
        const message = String(errorMessage || "");
        return message.includes("未检测到发布令牌") || message.includes("填写要发布到的系统名称");
      }

      async function loadPublishStatus() {
        const response = await fetch("/api/publish/status");
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || "读取发布配置失败");
        }
        return payload;
      }

      async function readResponseError(response, fallback) {
        const payload = await response.json().catch(() => null);
        return payload?.error || fallback || "操作失败";
      }

      function closePublishConfigModal() {
        publishConfigState = null;
        publishConfigModalEl.classList.add("hidden");
        publishConfigFormEl.reset();
        publishConfigMetaEl.textContent = "";
        publishConfigSubmitEl.disabled = false;
        publishConfigSubmitEl.textContent = "保存并继续发布";
      }

      function openPublishConfigModal({ item, button, confirmed, status, reason, errorMessage, updateExisting }) {
        const publishReason = reason || getPublishConfigReason(status, errorMessage);
        const systemName = String(status?.systemName || manifest.brandName || manifest.title || "").trim();
        const baseUrl = String(status?.baseUrl || "").trim();
        publishConfigState = {
          item,
          button,
          confirmed: Boolean(confirmed),
          status: status || null,
          reason: publishReason,
          updateExisting: Boolean(updateExisting),
        };
        if (publishReason === "both") {
          publishConfigHeadingEl.textContent = "发布前先补充系统信息";
          publishConfigSubtitleEl.textContent = "补齐系统名称和 Token 后，会继续当前这次发布。";
          publishConfigNoteTitleEl.textContent = "当前项目还没有完整的发布配置。";
          publishConfigNoteTextEl.innerHTML = "请先填写发布系统名称，并粘贴以 <code>pth_</code> 开头的掌玩令牌。";
        } else if (publishReason === "systemName") {
          publishConfigHeadingEl.textContent = "发布前先补充系统名称";
          publishConfigSubtitleEl.textContent = "补齐发布目标后，会继续当前这次发布。";
          publishConfigNoteTitleEl.textContent = "当前项目还缺少发布系统名称。";
          publishConfigNoteTextEl.textContent = "通常保持默认项目名即可，如果你有固定的掌玩系统名称，也可以直接填写。";
        } else {
          publishConfigHeadingEl.textContent = "首次发布前先配置 Token";
          publishConfigSubtitleEl.textContent = "配置只会保存到当前项目，后续发布会自动复用。";
          publishConfigNoteTitleEl.textContent = "未检测到当前项目的掌玩发布 Token。";
          publishConfigNoteTextEl.innerHTML = "把以 <code>pth_</code> 开头的令牌粘贴进来即可继续发布。";
        }
        publishConfigSystemNameEl.value = systemName;
        publishConfigTokenEl.value = "";
        publishConfigMetaEl.innerHTML = [
          baseUrl ? `发布地址：${escapeHtml(baseUrl)}` : "",
          "配置文件：.zhangtu/publish-config.json",
        ].filter(Boolean).map((line) => `<span>${line}</span>`).join("");
        publishConfigModalEl.classList.remove("hidden");
        window.requestAnimationFrame(() => {
          const focusTarget = publishReason === "systemName" || publishReason === "both" ? publishConfigSystemNameEl : publishConfigTokenEl;
          focusTarget?.focus();
          focusTarget?.select?.();
        });
      }

      async function savePublishConfigAndContinue(event) {
        event.preventDefault();
        if (!publishConfigState?.item) {
          closePublishConfigModal();
          return;
        }

        const systemName = publishConfigSystemNameEl.value.trim();
        const token = publishConfigTokenEl.value.trim();
        const needsToken = !publishConfigState?.status?.token?.configured;

        if (!systemName) {
          showToast("请先填写发布系统名称", 3200);
          publishConfigSystemNameEl.focus();
          return;
        }
        if (needsToken && !token) {
          showToast("请粘贴以 pth_ 开头的掌玩令牌", 3200);
          publishConfigTokenEl.focus();
          return;
        }

        publishConfigSubmitEl.disabled = true;
        publishConfigSubmitEl.textContent = "保存中…";

        try {
          const response = await fetch("/api/publish/config", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              systemName,
              token: token || undefined,
            }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload.error || "保存发布配置失败");
          }
          const pendingPublish = { ...publishConfigState };
          closePublishConfigModal();
          showToast("发布配置已保存，正在继续发布…", 1800);
          await publishVersion(pendingPublish.item, pendingPublish.button, {
            confirmed: pendingPublish.confirmed,
            updateExisting: pendingPublish.updateExisting,
          });
        } catch (error) {
          publishConfigSubmitEl.disabled = false;
          publishConfigSubmitEl.textContent = "保存并继续发布";
          showToast(error.message || "保存发布配置失败", 3600);
        }
      }

      async function loadProjectVersionCatalog() {
        const response = await fetch("/api/project/pages");
        const payload = await response.json();
        projectVersionPages = Array.isArray(payload.pages) ? payload.pages : [];
        projectVersionPageLibrary = payload.pageLibrary || { folders: [], rootPageIds: projectVersionPages.map((page) => page.id), pageMeta: {} };
      }

      function getVersionSelectionModel() {
        const map = new Map(projectVersionPages.map((page) => [page.id, page]));
        const library = projectVersionPageLibrary || {};
        const folders = Array.isArray(library.folders) ? library.folders : [];
        const referenced = new Set();
        const folderItems = folders.map((folder) => {
          const folderPageIds = (Array.isArray(folder.pageIds) ? folder.pageIds : []).filter((pageId) => map.has(pageId));
          folderPageIds.forEach((pageId) => referenced.add(pageId));
          return {
            id: folder.id,
            name: folder.name || "未命名文件夹",
            pageIds: folderPageIds,
            pages: folderPageIds.map((pageId) => map.get(pageId)),
          };
        }).filter((folder) => folder.pages.length > 0);
        const rootPageIds = (Array.isArray(library.rootPageIds) ? library.rootPageIds : []).filter((pageId) => map.has(pageId));
        rootPageIds.forEach((pageId) => referenced.add(pageId));
        const leftoverPageIds = projectVersionPages.map((page) => page.id).filter((pageId) => !referenced.has(pageId));
        return {
          rootPages: [...rootPageIds, ...leftoverPageIds].map((pageId) => map.get(pageId)).filter(Boolean),
          folders: folderItems,
        };
      }

      function toggleVersionPage(pageId) {
        const input = versionPageChecksEl.querySelector(`[data-version-page-toggle="${CSS.escape(pageId)}"]`);
        if (!input) {
          return;
        }
        const checked = input.checked;
        const mirror = versionPageChecksEl.querySelector(`[data-version-page-id="${CSS.escape(pageId)}"]`);
        if (mirror) {
          mirror.checked = checked;
        }
      }

      function toggleVersionFolder(pageIds) {
        const selected = new Set(Array.from(versionPageChecksEl.querySelectorAll("[data-version-page-toggle]:checked")).map((item) => item.getAttribute("data-version-page-toggle")));
        const allSelected = pageIds.length > 0 && pageIds.every((pageId) => selected.has(pageId));
        pageIds.forEach((pageId) => {
          const input = versionPageChecksEl.querySelector(`[data-version-page-toggle="${CSS.escape(pageId)}"]`);
          if (input) {
            input.checked = !allSelected;
          }
        });
      }

      function renderVersionPageChecks(selectedIds) {
        const selected = new Set(selectedIds || []);
        versionPageChecksEl.innerHTML = "";
        const model = getVersionSelectionModel();
        const pageRow = (page) => `
          <label class="vtree-row vtree-row--page">
            <input type="checkbox" value="${escapeHtml(page.id)}" data-version-page-id="${escapeHtml(page.id)}" data-version-page-toggle="${escapeHtml(page.id)}"${selected.has(page.id) ? " checked" : ""} />
            <span class="vtree-icon">${svg("file", "currentColor", 16)}</span>
            <span class="vtree-name">${escapeHtml(page.name)}</span>
          </label>
        `;

        const sections = [];
        model.rootPages.forEach((page) => {
          sections.push(pageRow(page));
        });

        model.folders.forEach((folder) => {
          if (!folder.pages.length) {
            return;
          }
          const pageIds = folder.pages.map((page) => page.id);
          const selectedCount = folder.pages.filter((page) => selected.has(page.id)).length;
          const allSelected = folder.pages.length > 0 && selectedCount === folder.pages.length;
          sections.push(`
            <div class="vtree-folder">
              <label class="vtree-row vtree-row--folder">
                <input type="checkbox" data-version-folder-toggle="${escapeHtml(folder.id)}"${allSelected ? " checked" : ""}${folder.pages.length ? "" : " disabled"} />
                <span class="vtree-icon">${svg("folder", "currentColor", 16)}</span>
                <span class="vtree-name">${escapeHtml(folder.name)}</span>
                <span class="vtree-count">${folder.pages.length ? `${selectedCount}/${folder.pages.length}` : "空"}</span>
              </label>
              <div class="vtree-children" data-version-folder-page-ids="${escapeHtml(pageIds.join(","))}">
                ${folder.pages.length ? folder.pages.map((page) => pageRow(page)).join("") : `<div class="vtree-empty">空文件夹</div>`}
              </div>
            </div>
          `);
        });

        versionPageChecksEl.innerHTML = sections.length ? `<div class="vtree-root">${sections.join("")}</div>` : `<div class="empty-state">当前没有可选页面。</div>`;

        document.querySelectorAll("[data-version-page-toggle]").forEach((input) => {
          input.addEventListener("change", () => {
            toggleVersionPage(input.getAttribute("data-version-page-toggle"));
            const folder = input.closest(".vtree-children");
            if (!folder) return;
            const wrapper = folder.closest(".vtree-folder");
            const folderToggle = wrapper?.querySelector("[data-version-folder-toggle]");
            const pageIds = String(folder.getAttribute("data-version-folder-page-ids") || "").split(",").filter(Boolean);
            const checkedCount = pageIds.filter((pageId) => {
              const pageInput = versionPageChecksEl.querySelector(`[data-version-page-toggle="${CSS.escape(pageId)}"]`);
              return pageInput && pageInput.checked;
            }).length;
            if (folderToggle) {
              folderToggle.checked = checkedCount > 0 && checkedCount === pageIds.length;
              folderToggle.indeterminate = checkedCount > 0 && checkedCount < pageIds.length;
            }
          });
        });

        document.querySelectorAll("[data-version-folder-toggle]").forEach((input) => {
          const folder = input.closest(".vtree-folder");
          const pageIds = String(folder?.querySelector(".vtree-children")?.getAttribute("data-version-folder-page-ids") || "").split(",").filter(Boolean);
          const checkedCount = pageIds.filter((pageId) => selected.has(pageId)).length;
          input.indeterminate = checkedCount > 0 && checkedCount < pageIds.length;
          input.addEventListener("change", () => toggleVersionFolder(pageIds));
        });
      }

      async function loadVersions() {
        const response = await fetch("/api/versions");
        const payload = await response.json();
        versionItems = payload.iterations || [];
        renderVersionList();
      }

      function renderVersionList() {
        versionListEl.innerHTML = "";
        if (!versionItems.length) {
          versionListEl.innerHTML = `<div class="empty-state">还没有版本，点击右上角「+ 新建版本」即可创建。</div>`;
          return;
        }

        versionItems.forEach((item) => {
          const card = document.createElement("div");
          card.className = "version-card";
          const shareUrl = getPublishedShareUrl(item);
          const isPublished = Boolean(item.isPublished || shareUrl);
          const publishedHtml = isPublished
            ? `<span class="version-card-published">已发布 · ${item.publishedAt ? new Date(item.publishedAt).toLocaleString("zh-CN", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) : ""}</span>`
            : "";
          const shareLinkHtml = shareUrl
            ? `<a class="version-card-link" href="${escapeHtml(shareUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(shareUrl)}</a>`
            : "";
          card.innerHTML = `
            <div class="version-card-main">
              <div class="version-card-copy">
                <strong>${escapeHtml(item.name)}</strong>
                <span class="version-card-desc">${escapeHtml(item.description || "无说明")}</span>
                <div class="version-card-meta">
                  <span class="version-card-tag">${item.pageCount} 个页面</span>
                  ${publishedHtml}
                </div>
                ${shareLinkHtml}
              </div>
            </div>`;
          const actions = document.createElement("div");
          actions.className = "version-card-actions";
          const preview = document.createElement("button");
          preview.type = "button";
          preview.className = "tool-button active";
          preview.textContent = "预览";
          preview.addEventListener("click", () => window.open(item.previewPath, "_blank", "noopener,noreferrer"));
          const edit = document.createElement("button");
          edit.type = "button";
          edit.className = "tool-button";
          edit.textContent = "编辑版本";
          edit.addEventListener("click", () => fillVersionForm(item));
          const publish = document.createElement("button");
          publish.type = "button";
          publish.className = "tool-button publish-button";
          publish.textContent = isPublished ? "已发布" : "发布";
          publish.disabled = isPublished;
          if (!isPublished) {
            publish.addEventListener("click", () => publishVersion(item, publish));
          }
          const updatePrototype = document.createElement("button");
          updatePrototype.type = "button";
          updatePrototype.className = "tool-button version-update-button";
          updatePrototype.textContent = "更新原型";
          updatePrototype.title = "重新上传当前本地原型和自动 PRD，线上链接保持不变";
          updatePrototype.addEventListener("click", () => publishVersion(item, updatePrototype, { updateExisting: true }));
          const openShare = document.createElement("a");
          openShare.className = "tool-button version-link-button";
          openShare.textContent = "打开链接";
          openShare.href = shareUrl || "#";
          openShare.target = "_blank";
          openShare.rel = "noopener noreferrer";
          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "tool-button danger-button";
          remove.textContent = "删除";
          remove.title = "仅删除本地版本";
          remove.addEventListener("click", () => deleteVersion(item.id));
          if (shareUrl) {
            actions.append(preview, edit, openShare, updatePrototype, publish, remove);
          } else {
            actions.append(preview, edit, publish, remove);
          }
          card.appendChild(actions);
          versionListEl.appendChild(card);
        });
      }

      function fillVersionForm(item) {
        versionIdEl.value = item.id;
        versionNameEl.value = item.name || "";
        versionDescEl.value = item.description || "";
        openVersionEditorModal(item.pageIds || []);
      }

      function resetVersionForm() {
        versionIdEl.value = "";
        versionNameEl.value = "";
        versionDescEl.value = "";
        renderVersionPageChecks();
      }

      async function saveVersion(event) {
        event.preventDefault();
        const id = versionIdEl.value.trim();
        const editingCurrentVersion = Boolean(id && isIterationPreview() && manifest.scope?.id === id);
        const body = {
          name: versionNameEl.value.trim(),
          description: versionDescEl.value.trim(),
          pageIds: Array.from(versionPageChecksEl.querySelectorAll("[data-version-page-id]:checked")).map((item) => item.value),
        };
        if (!body.name) {
          alert("请填写版本名称");
          return;
        }
        const response = await fetch(id ? `/api/versions/${encodeURIComponent(id)}` : "/api/versions", {
          method: id ? "PUT" : "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body)
        });
        if (!response.ok) {
          alert(await readResponseError(response, "保存版本失败"));
          return;
        }
        resetVersionForm();
        if (editingCurrentVersion) {
          closeVersionModal();
          showToast("版本已更新，正在刷新…");
          window.setTimeout(() => window.location.reload(), 240);
          return;
        }
        await loadVersions();
        versionEditorModalEl.classList.add("hidden");
        versionListModalEl.classList.remove("hidden");
      }

      async function deleteVersion(id, options = {}) {
        if (!confirm("确定删除本地版本？此操作仅删除本地数据，不影响已发布的线上版本。")) {
          return;
        }
        const response = await fetch(`/api/versions/${encodeURIComponent(id)}`, { method: "DELETE" });
        if (!response.ok) {
          alert(await readResponseError(response, "删除版本失败"));
          return;
        }
        if (options.redirectToProject) {
          window.location.href = "/";
          return;
        }
        resetVersionForm();
        await loadVersions();
      }

      async function publishVersion(item, btn, options = {}) {
        const updateExisting = Boolean(options.updateExisting);
        const shareUrl = getPublishedShareUrl(item);
        if (shareUrl && !updateExisting) {
          window.open(shareUrl, "_blank", "noopener,noreferrer");
          showToast(`该版本已发布：${shareUrl}`, 3200);
          return;
        }
        if (item?.isPublished && !updateExisting) {
          showToast("该版本已发布，不能重复发布。", 2600);
          return;
        }

        const confirmMessage = updateExisting
          ? "确认更新这个线上版本的原型吗？会重新上传当前本地原型和自动 PRD，分享链接保持不变。"
          : "确认发布这个版本到掌玩？发布前请确保发布配置已填写。";
        if (!options.confirmed && !confirm(confirmMessage)) {
          return;
        }

        let publishStatus = options.publishStatus || null;
        try {
          publishStatus = publishStatus || await loadPublishStatus();
        } catch (error) {
          alert(error.message || "读取发布配置失败");
          return;
        }

        if (shouldPromptPublishConfig(publishStatus)) {
          openPublishConfigModal({
            item,
            button: btn,
            confirmed: true,
            status: publishStatus,
            updateExisting,
          });
          return;
        }

        if (publishStatus?.runtime?.available === false) {
          alert("proto-hub 发布组件自动安装失败，请检查网络连接后重试。");
          return;
        }

        const targetButton = btn || document.getElementById("page-editor-toggle");
        const original = targetButton ? targetButton.textContent : "发布";
        let publishedAfterRequest = false;
        if (targetButton) {
          targetButton.disabled = true;
          targetButton.textContent = updateExisting ? "更新中…" : "发布中…";
        }
        try {
          const response = await fetch(`/api/versions/${encodeURIComponent(item.id)}/publish`, { method: "POST" });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const errorMessage = data.error || "发布失败";
            if (shouldRecoverPublishConfig(errorMessage)) {
              openPublishConfigModal({
                item,
                button: btn,
                confirmed: true,
                updateExisting,
                status: errorMessage.includes("系统名称")
                  ? { ...publishStatus, systemName: "" }
                  : { ...publishStatus, token: { ...(publishStatus?.token || {}), configured: false } },
                errorMessage,
              });
              return;
            }
            alert(errorMessage);
          } else {
            const shareUrl = data?.publish?.shareUrl;
            const resultMessage = data?.publish?.resultMessage || (updateExisting ? "原型已更新" : "版本已发布");
            const updatedIteration = data?.iteration || {};
            item.isPublished = true;
            item.publishedAt = updatedIteration.publishedAt || new Date().toISOString();
            item.publishedMeta = data?.publish || updatedIteration.publishedMeta || null;
            if (manifest.scope?.kind === "iteration" && manifest.scope?.id === item.id) {
              manifest.scope.publishedAt = item.publishedAt;
              manifest.scope.publishedMeta = item.publishedMeta;
              updateMainHeader();
            }
            publishedAfterRequest = true;
            showToast(shareUrl ? `${resultMessage}：${shareUrl}` : resultMessage);
            await loadVersions();
          }
        } catch (e) {
          alert(e.message || "发布失败");
        } finally {
          if (targetButton) {
            targetButton.disabled = false;
            targetButton.textContent = original;
            if (publishedAfterRequest) {
              updateMainHeader();
            }
          }
        }
      }

      function render() {
        ensureActiveMenuAvailable();
        renderShellState();
        renderNav();
        updateProjectPresentation();
        updateMainHeader();
        renderContent();
      }

      attachStaticEvents();
      render();
      refreshProjectPages({ silent: true });
      window.addEventListener("focus", () => {
        refreshProjectPages({ silent: true });
      });
    </script>
  </body>
</html>
