    <script>
      const manifest = __MANIFEST__;
      const pages = manifest.pages || [];
      let skillsPage = manifest.skillsPage || null;
      let designSystemPage = manifest.designSystemPage || null;
      const pageMap = new Map(pages.map((page) => [page.id, page]));
      const projectNameStorageKey = "zhangtu:customProjectName";
      const activeMenuStorageKey = "zhangtu:activeMenu";
      const sidebarCollapsedKey = "zhangtu:sidebarCollapsed";

      function isIterationPreview() {
        return Boolean(manifest.scope && manifest.scope.kind === "iteration");
      }

      function supportsAuxiliaryMenus() {
        return !isIterationPreview();
      }

      function getIterationDisplayTitle() {
        const value = String(manifest.scope?.title || manifest.scope?.name || manifest.title || "未命名版本").trim();
        return value || "未命名版本";
      }

      function getIterationDescription() {
        return String(manifest.scope?.description || "").trim();
      }

      function getPublishedShareUrl(item) {
        return String(item?.publishedMeta?.shareUrl || item?.shareUrl || "").trim();
      }

      function resolveInitialActiveMenu() {
        const requestedMenu = new URLSearchParams(location.search).get("page") || localStorage.getItem(activeMenuStorageKey) || "";
        if (isIterationPreview()) {
          return pageMap.has(requestedMenu) ? requestedMenu : (pages[0]?.id || "");
        }
        if (requestedMenu === "zhangtu-skills" || requestedMenu === "zhangtu-design-system" || requestedMenu === "zhangtu-workflow" || pageMap.has(requestedMenu)) {
          return requestedMenu;
        }
        return "zhangtu-skills";
      }

      const state = {
        activeMenu: resolveInitialActiveMenu(),
        device: "desktop",
        isSidebarCollapsed: isIterationPreview() ? false : sessionStorage.getItem(sidebarCollapsedKey) === "true",
        isRenamingProject: false,
        isDeviceMenuOpen: false,
        isRequirementsDrawerOpen: false,
        isPageEditorOpen: false,
        requirementsQuery: "",
        activeRequirementAnchor: null,
        annotationMarkersVisible: supportsAuxiliaryMenus(),
        annotationThemeColor: "#1677ff",
        openFolders: new Set(),
      };
      let projectPagesRefreshToken = 0;

      let dragSource = null; // { kind: "page"|"folder", id }
      let dragExpandTimer = null;
      let pagePointerDrag = null;

      const dragIndicatorEl = document.createElement("div");
      dragIndicatorEl.className = "drag-indicator";
      dragIndicatorEl.id = "drag-indicator";
      document.body.appendChild(dragIndicatorEl);

      function showDragIndicator(rect) {
        dragIndicatorEl.style.display = "block";
        dragIndicatorEl.style.top = `${rect.top}px`;
        dragIndicatorEl.style.left = `${rect.left}px`;
        dragIndicatorEl.style.width = `${rect.width}px`;
        dragIndicatorEl.style.right = "auto";
      }
      function hideDragIndicator() {
        dragIndicatorEl.style.display = "none";
      }
      function clearDragOverMarkers(navEl) {
        navEl.querySelectorAll(".drag-over, .drag-folder-over").forEach((el) => {
          el.classList.remove("drag-over", "drag-folder-over");
        });
        if (dragExpandTimer) {
          window.clearTimeout(dragExpandTimer);
          dragExpandTimer = null;
        }
        hideDragIndicator();
      }

      function cancelPagePointerDrag() {
        if (!pagePointerDrag) return;
        window.removeEventListener("pointermove", handlePagePointerDragMove);
        window.removeEventListener("pointerup", handlePagePointerDragEnd);
        window.removeEventListener("pointercancel", handlePagePointerDragEnd);
        pagePointerDrag.button?.classList.remove("drag-source");
        document.body.classList.remove("nav-page-dragging");
        const navEl = document.getElementById("nav");
        if (navEl) clearDragOverMarkers(navEl);
        pagePointerDrag = null;
      }

      function beginPagePointerDrag(event, button, pageId) {
        if (event.button !== 0) return;
        if (event.target.closest(".nav-item-title-input, .skills-item-delete, .nav-ctx-menu")) return;
        pagePointerDrag = {
          pageId,
          button,
          pointerId: event.pointerId,
          started: false,
          startX: event.clientX,
          startY: event.clientY,
        };
        try { button.setPointerCapture?.(event.pointerId); } catch {}
        window.addEventListener("pointermove", handlePagePointerDragMove);
        window.addEventListener("pointerup", handlePagePointerDragEnd);
        window.addEventListener("pointercancel", handlePagePointerDragEnd);
      }

      function handlePagePointerDragMove(event) {
        if (!pagePointerDrag) return;
        if (pagePointerDrag.pointerId !== undefined && event.pointerId !== pagePointerDrag.pointerId) return;

        const deltaX = event.clientX - pagePointerDrag.startX;
        const deltaY = event.clientY - pagePointerDrag.startY;
        if (!pagePointerDrag.started) {
          if (Math.hypot(deltaX, deltaY) < 6) return;
          pagePointerDrag.started = true;
          pagePointerDrag.button.classList.add("drag-source");
          document.body.classList.add("nav-page-dragging");
        }

        event.preventDefault();
        updatePagePointerDragTarget(event.clientX, event.clientY);
      }

      function updatePagePointerDragTarget(clientX, clientY) {
        if (!pagePointerDrag?.started) return;
        const navEl = document.getElementById("nav");
        if (!navEl) return;

        clearDragOverMarkers(navEl);

        const hit = document.elementFromPoint(clientX, clientY);
        if (!hit) return;

        const pageItem = hit.closest(".nav-item[data-page-id]");
        if (pageItem) {
          const targetPageId = pageItem.getAttribute("data-page-id");
          if (targetPageId && targetPageId !== pagePointerDrag.pageId) {
            const rect = pageItem.getBoundingClientRect();
            const before = clientY < rect.top + rect.height / 2;
            showDragIndicator({
              top: before ? rect.top : rect.bottom,
              left: rect.left,
              width: rect.width,
            });
            pagePointerDrag.dropTarget = { kind: "page", targetPageId, before };
            return;
          }
        }

        const folderEl = hit.closest(".nav-folder");
        if (folderEl) {
          const folderId = folderEl.getAttribute("data-folder-id");
          if (folderId) {
            folderEl.classList.add("drag-over");
            const headerEl = folderEl.querySelector(".nav-folder-header");
            if (headerEl) {
              const rect = headerEl.getBoundingClientRect();
              showDragIndicator({
                top: rect.bottom,
                left: rect.left,
                width: rect.width,
              });
            }
            if (!state.openFolders.has(folderId) && !dragExpandTimer) {
              dragExpandTimer = window.setTimeout(() => {
                dragExpandTimer = null;
                state.openFolders.add(folderId);
                renderNav();
              }, 320);
            }
            pagePointerDrag.dropTarget = { kind: "folder", folderId };
            return;
          }
        }

        const rootDrop = hit.closest(".nav-root-drop");
        if (rootDrop) {
          rootDrop.classList.add("drag-over");
          const rect = rootDrop.getBoundingClientRect();
          showDragIndicator({
            top: rect.bottom - 2,
            left: rect.left,
            width: rect.width,
          });
          pagePointerDrag.dropTarget = { kind: "root" };
        }
      }

      async function handlePagePointerDragEnd(event) {
        if (!pagePointerDrag) return;
        if (pagePointerDrag.pointerId !== undefined && event.pointerId !== pagePointerDrag.pointerId) {
          return;
        }

        const drag = pagePointerDrag;
        cancelPagePointerDrag();
        if (!drag.started || !drag.dropTarget) return;

        if (drag.dropTarget.kind === "folder") {
          await movePageToFolder(drag.pageId, drag.dropTarget.folderId);
          return;
        }

        if (drag.dropTarget.kind === "root") {
          await movePageToFolder(drag.pageId, null);
          return;
        }

        if (drag.dropTarget.kind === "page") {
          const targetPage = pageMap.get(drag.dropTarget.targetPageId);
          if (!targetPage) return;
          const targetFolderId = targetPage.folderId || null;
          const navEl = document.getElementById("nav");
          if (!navEl) return;
          const targetEl = navEl.querySelector(`.nav-item[data-page-id="${CSS.escape(drag.dropTarget.targetPageId)}"]`);
          if (!targetEl) return;
          const container = targetEl.parentElement;
          const siblingItems = Array.from(container.querySelectorAll(":scope > .nav-item[data-page-id]"));
          let targetIndex = siblingItems.indexOf(targetEl);
          if (!drag.dropTarget.before) targetIndex += 1;
          const sourcePage = pageMap.get(drag.pageId);
          const sourceFolderId = (sourcePage && sourcePage.folderId) || null;
          if (sourceFolderId === targetFolderId) {
            const sourceIdx = siblingItems.findIndex((el) => el.getAttribute("data-page-id") === drag.pageId);
            if (sourceIdx !== -1 && sourceIdx < targetIndex) targetIndex -= 1;
          }
          await movePageToFolder(drag.pageId, targetFolderId, targetIndex);
        }
      }

      const versionEditorModalEl = document.getElementById("version-editor-modal");
      const versionListModalEl = document.getElementById("version-list-modal");
      const versionListEl = document.getElementById("version-list");
      const versionFormEl = document.getElementById("version-form");
      const versionIdEl = document.getElementById("version-id");
      const versionNameEl = document.getElementById("version-name");
      const versionDescEl = document.getElementById("version-desc");
      const versionPageChecksEl = document.getElementById("version-page-checks");
      const publishConfigModalEl = document.getElementById("publish-config-modal");
      const publishConfigFormEl = document.getElementById("publish-config-form");
      const publishConfigHeadingEl = document.getElementById("publish-config-heading");
      const publishConfigSubtitleEl = document.getElementById("publish-config-subtitle");
      const publishConfigNoteTitleEl = document.getElementById("publish-config-note-title");
      const publishConfigNoteTextEl = document.getElementById("publish-config-note-text");
      const publishConfigSystemNameEl = document.getElementById("publish-config-system-name");
      const publishConfigTokenEl = document.getElementById("publish-config-token");
      const publishConfigMetaEl = document.getElementById("publish-config-meta");
      const publishConfigSubmitEl = document.getElementById("publish-config-submit");
      let versionItems = [];
      let projectVersionPages = pages.slice();
      let projectVersionPageLibrary = manifest.pageLibrary || { folders: [], rootPageIds: pages.map((page) => page.id), pageMeta: {} };
      let publishConfigState = null;
      const requirementPersistTimers = new Map();

      function svg(name, color, size) {
        const icons = {
          columns: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>`,
          chevronDown: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`,
          edit: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>`,
          refresh: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>`,
          monitor: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"></rect><path d="M12 16v4"></path><path d="M8 20h8"></path></svg>`,
          smartphone: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"></rect><path d="M12 18h.01"></path></svg>`,
          maximize: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M21 8V5a2 2 0 0 0-2-2h-3"></path><path d="M3 16v3a2 2 0 0 0 2 2h3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>`,
          externalLink: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path></svg>`,
          notes: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5V5a2 2 0 0 1 2-2h9l5 5v11.5a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 19.5Z"></path><path d="M14 3v5h5"></path><path d="M8 13h8"></path><path d="M8 17h5"></path></svg>`,
          palette: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a1 1 0 0 0 1-1v-2.2a1 1 0 0 1 1.3-1l1.6.53A4.9 4.9 0 0 0 22 13.6 9.9 9.9 0 1 0 12 22Z"></path><path d="M8 11a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path><path d="M12 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path><path d="M16 11a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>`,
          file: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16l4-3 4 3 4-3 4 3V8Z"></path><path d="M14 2v6h6"></path></svg>`,
          layers: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 10 6-10 6L2 8l10-6Z"></path><path d="m2 12 10 6 10-6"></path><path d="m2 16 10 6 10-6"></path></svg>`,
          download: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>`,
          sparkles: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>`,
          arrowLeft: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>`,
          workflow: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="6" height="6" rx="1"></rect><rect x="15" y="15" width="6" height="6" rx="1"></rect><path d="M9 6h6a2 2 0 0 1 2 2v7"></path><path d="M6 9v6a2 2 0 0 0 2 2h4"></path></svg>`,
          upload: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><path d="m7 8 5-5 5 5"></path><path d="M5 21h14"></path></svg>`,
          trash: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>`
        };
        return icons[name] || "";
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function normalizeProjectTitle(value) {
        const trimmed = String(value == null ? "" : value).trim();
        const withoutPrefix = trimmed.replace(/^掌视/, "").trim();
        const withoutSystemSuffix = withoutPrefix.replace(/\\s*原型系统\\s*$/, "");
        const withoutBrandSuffix = withoutSystemSuffix.replace(/\\s*-\\s*Zhangtu\\s*$/i, "").replace(/\\s*-\\s*zhangtu\\s*$/i, "");
        const bare = withoutBrandSuffix.replace(/^【/, "").replace(/】$/, "").trim();
        return bare || "项目名称";
      }

      function getStoredProjectName() {
        return normalizeProjectTitle(localStorage.getItem(projectNameStorageKey) || manifest.brandName || manifest.title || "项目名称");
      }

      function getDisplayTitle() {
        return isIterationPreview() ? getIterationDisplayTitle() : getStoredProjectName();
      }

      function getDisplayDescription() {
        if (!isIterationPreview()) {
          return manifest.systemVersion ? `掌图 v${manifest.systemVersion}` : "";
        }
        return getIterationDescription() || "无版本说明";
      }

      function getProjectDocumentTitle(value) {
        if (isIterationPreview()) {
          return `${String(value || "未命名版本").trim() || "未命名版本"} - Zhangtu`;
        }
        return `${normalizeProjectTitle(value)}-Zhangtu`;
      }

      function updateProjectPresentation() {
        const currentName = getDisplayTitle();
        const currentDescription = getDisplayDescription();
        document.getElementById("project-name").textContent = currentName;
        const subtitleEl = document.getElementById("project-subtitle");
        subtitleEl.textContent = currentDescription;
        subtitleEl.classList.toggle("hidden", !currentDescription);
        const trigger = document.getElementById("project-trigger");
        trigger.classList.toggle("is-readonly", isIterationPreview());
        trigger.title = isIterationPreview() ? "版本预览" : "双击重命名项目";
        const input = document.getElementById("project-name-input");
        if (input && !state.isRenamingProject && !isIterationPreview()) {
          input.value = currentName;
        }
        document.title = getProjectDocumentTitle(currentName);
      }

      function getDeviceLabel(device) {
        if (device === "mobile") return "移动端";
        return "桌面端";
      }

      function getDeviceIcon(device, color) {
        if (device === "mobile") return svg("smartphone", color, 16);
        return svg("monitor", color, 16);
      }

      function updateDeviceSwitch() {
        const trigger = document.getElementById("device-trigger");
        const menu = document.getElementById("device-menu");
        if (!trigger || !menu) {
          return;
        }
        trigger.innerHTML = getDeviceIcon(state.device, "currentColor");
        trigger.setAttribute("aria-label", `切换设备，当前为${getDeviceLabel(state.device)}`);
        trigger.setAttribute("aria-expanded", state.isDeviceMenuOpen ? "true" : "false");
        trigger.classList.toggle("is-open", state.isDeviceMenuOpen);
        menu.classList.toggle("hidden", !state.isDeviceMenuOpen);
        menu.querySelectorAll("[data-device-option]").forEach((button) => {
          const device = button.getAttribute("data-device-option");
          const active = device === state.device;
          button.classList.toggle("active", active);
          button.innerHTML = `${getDeviceIcon(device, "currentColor")}<span>${escapeHtml(getDeviceLabel(device))}</span>`;
        });
      }

      function setDevice(device) {
        state.device = device === "mobile" ? "mobile" : "desktop";
        state.isDeviceMenuOpen = false;
        const frameWrap = document.getElementById("frame-wrap");
        if (frameWrap) {
          frameWrap.className = `frame-wrap ${state.device}`;
        }
        const liveShell = document.querySelector(".live-preview-shell");
        if (liveShell) {
          liveShell.classList.toggle("device-mobile", state.device === "mobile");
          liveShell.classList.toggle("device-desktop", state.device !== "mobile");
        }
        updateDeviceSwitch();
      }

      function startProjectRename() {
        if (isIterationPreview()) {
          return;
        }
        const input = document.getElementById("project-name-input");
        const nameEl = document.getElementById("project-name");
        if (!input || !nameEl || state.isRenamingProject) {
          return;
        }
        state.isRenamingProject = true;
        input.value = getStoredProjectName();
        nameEl.classList.add("hidden");
        input.classList.remove("hidden");
        requestAnimationFrame(() => {
          input.focus();
          input.select();
        });
      }

      function finishProjectRename(save) {
        if (isIterationPreview()) {
          return;
        }
        const input = document.getElementById("project-name-input");
        const nameEl = document.getElementById("project-name");
        if (!input || !nameEl || !state.isRenamingProject) {
          return;
        }
        if (save) {
          const normalized = normalizeProjectTitle(input.value);
          localStorage.setItem(projectNameStorageKey, normalized);
        }
        state.isRenamingProject = false;
        input.classList.add("hidden");
        nameEl.classList.remove("hidden");
        updateProjectPresentation();
      }

      function showToast(message, duration) {
        const container = document.getElementById("toast-container");
        if (!container) { window.alert(message); return; }
        const item = document.createElement("div");
        item.className = "toast-item";
        item.textContent = message;
        container.appendChild(item);
        setTimeout(() => {
          item.classList.add("fade-out");
          setTimeout(() => item.remove(), 320);
        }, duration || 2800);
      }

      function downloadSkillArchive(url, fallbackName) {
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = fallbackName || "skill.zip";
        anchor.rel = "noopener";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      }

      /* ===== Rename dialog ===== */
      let _renameSubmitHandler = null;

      function openRenameDialog(title, currentValue, onConfirm) {
        const dialog = document.getElementById("rename-dialog");
        const titleEl = document.getElementById("rename-dialog-title");
        const input = document.getElementById("rename-dialog-input");
        const form = document.getElementById("rename-dialog-form");
        const cancelBtn = document.getElementById("rename-dialog-cancel");

        titleEl.textContent = title;
        input.value = currentValue;
        dialog.classList.remove("hidden");
        requestAnimationFrame(() => { input.focus(); input.select(); });

        function close() { dialog.classList.add("hidden"); }

        function handleSubmit(e) {
          e.preventDefault();
          const value = input.value.trim();
          close();
          if (value) onConfirm(value);
        }

        if (_renameSubmitHandler) {
          form.removeEventListener("submit", _renameSubmitHandler);
        }
        _renameSubmitHandler = handleSubmit;
        form.addEventListener("submit", handleSubmit);

        cancelBtn.onclick = close;
        dialog.onclick = (e) => { if (e.target === dialog) close(); };
      }

      /* ===== Requirements drawer — in-place update (preserves iframe) ===== */
      function updateRequirementsState() {
        const page = getActivePage();
        const requirements = getRequirementsForPage(page);
        const reqToggle = document.getElementById("requirements-toggle");
        if (reqToggle) {
          const hasRequirements = Boolean(requirements.length);
          reqToggle.classList.toggle("hidden", !hasRequirements);
          reqToggle.classList.toggle("is-active", state.isRequirementsDrawerOpen && hasRequirements);
        }

        syncIframeRequirementSelection();
      }

      function refreshRequirementsSidebar() {
        const page = getActivePage();
        const shell = document.querySelector(".live-preview-shell");
        const sidebar = shell && shell.querySelector(".requirements-sidebar");
        if (!page || !shell || !sidebar) {
          return;
        }

        const shouldOpen = state.isRequirementsDrawerOpen && getRequirementsForPage(page).length;
        shell.classList.toggle("has-requirements-sidebar", Boolean(shouldOpen));

        const nextSidebar = document.createElement("div");
        nextSidebar.innerHTML = renderRequirementsSidebar(page).trim();
        const nextNode = nextSidebar.firstElementChild;
        if (!nextNode) {
          return;
        }
        sidebar.replaceWith(nextNode);
        attachRequirementsSidebarEvents();
      }

      function getActivePage() {
        return pageMap.get(state.activeMenu) || null;
      }

      function ensureActiveMenuAvailable() {
        if (supportsAuxiliaryMenus() && (state.activeMenu === "zhangtu-skills" || state.activeMenu === "zhangtu-design-system" || state.activeMenu === "zhangtu-workflow")) {
          return;
        }
        if (pageMap.has(state.activeMenu)) {
          return;
        }
        state.activeMenu = pages[0]?.id || (supportsAuxiliaryMenus() ? "zhangtu-skills" : "");
        localStorage.setItem(activeMenuStorageKey, state.activeMenu);
        updateHistory();
      }

      function getRequirementsForPage(page) {
        return Array.isArray(page && page.requirementModules) ? page.requirementModules : [];
      }

      function setRequirementsForPage(pageId, annotations) {
        const page = pageMap.get(pageId);
        if (!page) {
          return [];
        }
        const normalized = normalizeRequirementAnnotations(annotations);
        page.requirementModules = normalized;
        return normalized;
      }

      function postRequirementsToFrame(page, anchorId, presentation = "panel") {
        const iframe = document.getElementById("page-frame");
        if (!iframe || !iframe.contentWindow || !page) {
          return;
        }

        iframe.contentWindow.postMessage({
          type: "zhangtu:requirements-hydrate",
          annotations: getRequirementsForPage(page),
        }, "*");

        if (anchorId) {
          iframe.contentWindow.postMessage({
            type: "zhangtu:requirements-focus",
            anchorId,
            presentation,
          }, "*");
        }
      }

      function postRequirementPanelState(open) {
        const iframe = document.getElementById("page-frame");
        if (!iframe || !iframe.contentWindow) {
          return;
        }
        iframe.contentWindow.postMessage({
          type: "zhangtu:requirements-panel",
          open,
        }, "*");
      }

      function postPageEditorPanelState(open) {
        const iframe = document.getElementById("page-frame");
        if (!iframe || !iframe.contentWindow) {
          return;
        }
        iframe.contentWindow.postMessage({
          type: "zhangtu:page-editor-panel",
          open,
        }, "*");
      }

      function postAnnotationTheme(color) {
        const iframe = document.getElementById("page-frame");
        if (!iframe || !iframe.contentWindow) return;
        iframe.contentWindow.postMessage({ type: "zhangtu:requirements-theme", color }, "*");
      }

      function postAnnotationVisibility(visible) {
        const iframe = document.getElementById("page-frame");
        if (!iframe || !iframe.contentWindow) return;
        iframe.contentWindow.postMessage({ type: "zhangtu:requirements-visibility", visible }, "*");
      }

      async function persistRequirementsForPage(pageId, annotations) {
        if (manifest.scope?.kind !== "iteration" || !manifest.scope?.id) {
          return;
        }

        const timer = requirementPersistTimers.get(pageId);
        if (timer) {
          window.clearTimeout(timer);
        }

        requirementPersistTimers.set(pageId, window.setTimeout(async () => {
          requirementPersistTimers.delete(pageId);
          try {
            await fetch(`/api/versions/${encodeURIComponent(manifest.scope.id)}/requirements/${encodeURIComponent(pageId)}`, {
              method: "PUT",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ annotations }),
            });
          } catch (error) {
            showToast(`页面备注同步失败：${error.message}`);
          }
        }, 160));
      }

      function attachRequirementsSidebarEvents() {
        document.querySelectorAll("[data-requirement-open]").forEach((button) => {
          button.addEventListener("click", () => {
            const anchorId = button.getAttribute("data-requirement-open");
            if (!anchorId) {
              return;
            }
            openRequirementByAnchor(anchorId, {
              openPanel: true,
              presentation: "popup",
            });
          });
        });

        document.querySelectorAll("[data-requirement-edit]").forEach((button) => {
          button.addEventListener("click", () => {
            const anchorId = button.getAttribute("data-requirement-edit");
            if (!anchorId) {
              return;
            }
            openRequirementEditorByAnchor(anchorId);
          });
        });

        const closeButton = document.getElementById("requirements-sidebar-close");
        if (closeButton) {
          closeButton.addEventListener("click", () => {
            state.isRequirementsDrawerOpen = false;
            updateMainHeader();
            updateRequirementsState();
            postRequirementPanelState(false);
            refreshRequirementsSidebar();
          });
        }

        const searchInput = document.getElementById("requirements-search");
        if (searchInput) {
          searchInput.addEventListener("input", () => {
            state.requirementsQuery = searchInput.value;
            refreshRequirementsSidebar();
            const next = document.getElementById("requirements-search");
            if (next) { next.focus(); const l = next.value.length; next.setSelectionRange(l, l); }
          });
        }

        const visibilityToggle = document.getElementById("requirements-visibility-toggle");
        if (visibilityToggle) {
          visibilityToggle.addEventListener("click", () => {
            state.annotationMarkersVisible = !state.annotationMarkersVisible;
            postAnnotationVisibility(state.annotationMarkersVisible);
            refreshRequirementsSidebar();
          });
        }

        const colorInput = document.getElementById("requirements-theme-color");
        if (colorInput) {
          colorInput.addEventListener("input", () => {
            state.annotationThemeColor = colorInput.value;
            postAnnotationTheme(state.annotationThemeColor);
            const preview = document.querySelector(".requirements-color-preview");
            if (preview) preview.style.background = colorInput.value;
          });
        }
      }

      function handleRequirementBridgeMessage(event) {
        const frame = document.getElementById("page-frame");
        if (event.source !== (frame && frame.contentWindow)) {
          return;
        }

        const data = event.data || {};
        if (data.type === "zhangtu:sidebar-toggle") {
          toggleSidebar();
          return;
        }

        const page = getActivePage();
        if (!page) {
          return;
        }
        if (data.type === "zhangtu:requirements-ready") {
          postRequirementsToFrame(page, state.activeRequirementAnchor, "popup");
          postRequirementPanelState(false);
          postPageEditorPanelState(state.isPageEditorOpen);
          postAnnotationTheme(state.annotationThemeColor);
          postAnnotationVisibility(state.annotationMarkersVisible);
          return;
        }

        if (data.type === "zhangtu:requirements-updated" && Array.isArray(data.annotations)) {
          const normalized = setRequirementsForPage(page.id, data.annotations);
          if (!normalized.length) {
            state.activeRequirementAnchor = null;
          } else if (!normalized.some((item) => item.anchorId === state.activeRequirementAnchor || item.id === state.activeRequirementAnchor)) {
            state.activeRequirementAnchor = normalized[0].anchorId || normalized[0].id;
          }
          updateRequirementsState();
          refreshRequirementsSidebar();
          persistRequirementsForPage(page.id, normalized);
          return;
        }

        if (data.type === "zhangtu:requirements-select" && data.anchorId) {
          const requirements = getRequirementsForPage(page);
          const matched = requirements.find((item) => item.anchorId === data.anchorId || item.id === data.anchorId);
          if (!matched) {
            return;
          }
          state.activeRequirementAnchor = matched.anchorId || matched.id;
          updateRequirementsState();
          refreshRequirementsSidebar();
          return;
        }

        if (data.type === "zhangtu:requirements-request-open" && data.anchorId) {
          openRequirementByAnchor(data.anchorId, {
            openPanel: true,
            presentation: "popup",
          });
          return;
        }

        if (data.type === "zhangtu:requirements-request-edit" && data.anchorId) {
          openRequirementEditorByAnchor(data.anchorId);
        }
      }

      function ensureActiveRequirement(page) {
        const requirements = getRequirementsForPage(page);
        if (!requirements.length) {
          state.activeRequirementAnchor = null;
          return null;
        }
        const matched = requirements.find((item) => item.anchorId === state.activeRequirementAnchor || item.id === state.activeRequirementAnchor);
        const next = matched || requirements[0];
        state.activeRequirementAnchor = next.anchorId || next.id;
        return next;
      }

      function updateHistory() {
        const params = new URLSearchParams(location.search);
        if (pageMap.has(state.activeMenu)) {
          params.set("page", state.activeMenu);
        } else {
          params.delete("page");
        }
        const query = params.toString();
        history.replaceState(null, "", `${location.pathname}${query ? `?${query}` : ""}`);
      }

      function setActiveMenu(menuId) {
        state.activeMenu = menuId;
        state.isRequirementsDrawerOpen = false;
        state.isPageEditorOpen = false;
        state.requirementsQuery = "";
        state.activeRequirementAnchor = null;
        localStorage.setItem(activeMenuStorageKey, state.activeMenu);
        updateHistory();
        render();
      }

      function toggleSidebar() {
        state.isSidebarCollapsed = !state.isSidebarCollapsed;
        sessionStorage.setItem(sidebarCollapsedKey, String(state.isSidebarCollapsed));
        renderShellState();
      }

      window.toggleSidebar = toggleSidebar;

      function renderShellState() {
        document.getElementById("shell").classList.toggle("collapsed", state.isSidebarCollapsed);
      }

      /* ===== Page library API helpers ===== */
      async function plApi(method, path, body) {
        const res = await fetch(`/api/page-library${path}`, {
          method,
          headers: body !== undefined ? { "content-type": "application/json" } : {},
          body: body !== undefined ? JSON.stringify(body) : undefined,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "操作失败");
        if (data.manifest) {
          Object.assign(manifest, data.manifest);
          pages.length = 0;
          pages.push(...(manifest.pages || []));
          skillsPage = data.manifest.skillsPage || null;
          designSystemPage = data.manifest.designSystemPage || null;
          pageMap.clear();
          pages.forEach((p) => pageMap.set(p.id, p));
          ensureActiveMenuAvailable();
        }
        return data;
      }

      function applyManifestPages(nextManifest) {
        Object.assign(manifest, nextManifest);
        pages.length = 0;
        pages.push(...(manifest.pages || []));
        skillsPage = nextManifest.skillsPage || manifest.skillsPage || null;
        designSystemPage = nextManifest.designSystemPage || manifest.designSystemPage || null;
        pageMap.clear();
        pages.forEach((page) => pageMap.set(page.id, page));
        ensureActiveMenuAvailable();
      }

      async function refreshProjectPages({ silent = false } = {}) {
        if (manifest.scope?.kind !== "project") {
          return;
        }

        const currentToken = ++projectPagesRefreshToken;

        try {
          const response = await fetch("/api/project/pages");
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "读取页面列表失败");
          }
          if (currentToken !== projectPagesRefreshToken) {
            return;
          }

          applyManifestPages({
            pages: data.pages || [],
            pageLibrary: data.pageLibrary || manifest.pageLibrary,
          });
          render();
        } catch (error) {
          if (!silent) {
            showToast(error.message || "页面列表刷新失败");
          }
        }
      }

      function createNavFolder() {
        const navEl = document.getElementById("nav");
        if (navEl.querySelector(".nav-inline-new-folder")) {
          navEl.querySelector(".nav-inline-new-folder .nav-inline-edit-input")?.focus();
          return;
        }
        const wrapper = document.createElement("div");
        wrapper.className = "nav-inline-edit nav-inline-new-folder";
        wrapper.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-tertiary);flex-shrink:0"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2Z"></path></svg>
          <input class="nav-inline-edit-input" type="text" placeholder="文件夹名称" />
        `;
        navEl.appendChild(wrapper);
        const input = wrapper.querySelector(".nav-inline-edit-input");
        const commit = async () => {
          const name = input.value.trim();
          if (document.contains(wrapper)) wrapper.remove();
          if (!name) return;
          try {
            const data = await plApi("POST", "/folders", { name });
            state.openFolders.add(data.folder.id);
            render();
          } catch (e) { showToast(e.message); }
        };
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); commit(); }
          if (e.key === "Escape") { if (document.contains(wrapper)) wrapper.remove(); }
        });
        input.addEventListener("blur", () => setTimeout(() => { if (document.contains(wrapper)) wrapper.remove(); }, 120));
        input.focus();
      }

      async function renameNavFolder(folderId, currentName) {
        openRenameDialog("重命名文件夹", currentName, async (name) => {
          if (name === currentName) return;
          try {
            await plApi("PUT", `/folders/${encodeURIComponent(folderId)}`, { name });
            render();
          } catch (e) { showToast(e.message); }
        });
      }

      async function deleteNavFolder(folderId) {
        if (!confirm("删除此文件夹？文件夹中的页面将移回根目录。")) return;
        try {
          await plApi("DELETE", `/folders/${encodeURIComponent(folderId)}`);
          state.openFolders.delete(folderId);
          render();
        } catch (e) { showToast(e.message); }
      }

      async function renameNavPage(pageId, currentName) {
        openRenameDialog("重命名页面", currentName, async (name) => {
          if (name === currentName) return;
          try {
            await plApi("POST", `/pages/${encodeURIComponent(pageId)}/rename`, { name });
            render();
          } catch (e) { showToast(e.message); }
        });
      }

      async function duplicateNavPage(pageId) {
        try {
          await plApi("POST", `/pages/${encodeURIComponent(pageId)}/duplicate`);
          render();
        } catch (e) { showToast(e.message); }
      }

      async function deleteNavPage(pageId) {
        const page = pageMap.get(pageId);
        if (!confirm(`确定删除页面「${page ? page.name : pageId}」？此操作不可恢复。`)) return;
        try {
          await plApi("DELETE", `/pages/${encodeURIComponent(pageId)}`);

      async function movePageToFolder(pageId, folderId, index) {
        try {
          const body = { folderId: folderId || null };
          if (Number.isFinite(index)) body.index = index;
          await plApi("POST", `/pages/${encodeURIComponent(pageId)}/move`, body);
          render();
        } catch (e) { showToast(e.message); }

      async function moveFolderTo(folderId, index) {
        try {
          const body = {};
          if (Number.isFinite(index)) body.index = index;
          await plApi("POST", `/folders/${encodeURIComponent(folderId)}/move`, body);
          render();
        } catch (e) { showToast(e.message); }

      /* ===== Inline rename helpers ===== */
      function startInlinePageRename(buttonEl, pageId) {
        const titleEl = buttonEl.querySelector(".nav-item-title");
        if (!titleEl || buttonEl.querySelector(".nav-item-title-input")) return;
        const currentName = titleEl.textContent;
        const input = document.createElement("input");
        input.className = "nav-item-title-input";
        input.value = currentName;
        titleEl.replaceWith(input);
        let committed = false;
        const revert = () => { if (document.contains(input)) input.replaceWith(titleEl); };
        const commit = async () => {
          if (committed) return;
          committed = true;
          const name = input.value.trim();
          if (!name || name === currentName) { revert(); return; }
          input.disabled = true;
          try {
            await plApi("POST", `/pages/${encodeURIComponent(pageId)}/rename`, { name });
            render();
          } catch (e) { showToast(e.message); revert(); }
        };
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); commit(); }
          if (e.key === "Escape") { revert(); }
        });
        input.addEventListener("blur", () => setTimeout(commit, 100));
        requestAnimationFrame(() => { input.focus(); input.select(); });
      }

      function startInlineFolderRename(nameEl, folderId) {
        if (nameEl.querySelector("input")) return;
        const currentName = nameEl.textContent;
        const input = document.createElement("input");
        input.className = "nav-inline-edit-input";
        input.style.cssText = "width:100%;max-width:100%;";
        input.value = currentName;
        nameEl.replaceWith(input);
        let committed = false;
        const revert = () => { if (document.contains(input)) input.replaceWith(nameEl); };
        const commit = async () => {
          if (committed) return;
          committed = true;
          const name = input.value.trim();
          if (!name || name === currentName) { revert(); return; }
          input.disabled = true;
          try {
            await plApi("PUT", `/folders/${encodeURIComponent(folderId)}`, { name });
            render();
          } catch (e) { showToast(e.message); revert(); }
        };
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); commit(); }
          if (e.key === "Escape") { revert(); }
        });
        input.addEventListener("blur", () => setTimeout(commit, 100));
        requestAnimationFrame(() => { input.focus(); input.select(); });
      }

      /* ===== Page edit modal ===== */
      let _pageEditCurrentId = null;

      async function openPageEditModal(pageId) {
        const page = pageMap.get(pageId);
        if (!page) return;
        _pageEditCurrentId = pageId;

        const modal = document.getElementById("page-edit-modal");
        const nameInput = document.getElementById("page-edit-name");
        const specArea = document.getElementById("page-edit-spec");
        const metaEl = document.getElementById("page-edit-meta");

        nameInput.value = page.name || "";
        specArea.value = "加载中…";
        specArea.disabled = true;
        metaEl.innerHTML = `<span class="page-edit-meta-tag">${escapeHtml(page.sourcePath || page.id)}</span>`;
        modal.classList.remove("hidden");
        nameInput.focus();

        try {
          const res = await fetch(`/api/page-library/pages/${encodeURIComponent(pageId)}/spec`);
          const data = await res.json();
          if (_pageEditCurrentId === pageId) {
            specArea.value = data.content || "";
            specArea.disabled = false;
          }
        } catch {
          if (_pageEditCurrentId === pageId) {
            specArea.value = "";
            specArea.disabled = false;
          }
        }

        document.getElementById("page-edit-close").onclick = () => modal.classList.add("hidden");
        modal.onclick = (e) => { if (e.target === modal) modal.classList.add("hidden"); };

        document.getElementById("page-edit-save-name").onclick = async () => {
          const name = nameInput.value.trim();
          if (!name) return;
          const btn = document.getElementById("page-edit-save-name");
          btn.disabled = true;
          try {
            await plApi("POST", `/pages/${encodeURIComponent(pageId)}/rename`, { name });
            render();
          } catch (e) {
            showToast(e.message);
          } finally {
            btn.disabled = false;
          }
        };

        document.getElementById("page-edit-save-spec").onclick = async () => {
          const btn = document.getElementById("page-edit-save-spec");
          btn.disabled = true;
          btn.textContent = "保存中…";
          try {
            const res = await fetch(`/api/page-library/pages/${encodeURIComponent(pageId)}/spec`, {
              method: "PUT",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ content: specArea.value }),
            });
            if (!res.ok) {
              const d = await res.json();
              showToast(d.error || "保存失败");
            } else {
              showToast("Spec 已保存");
            }
          } catch (e) {
            showToast(e.message || "保存失败");
          } finally {
            btn.disabled = false;
            btn.textContent = "保存 Spec";
          }
        };
      }

      /* ===== Context menu ===== */
      let ctxMenu = null;

      function showCtxMenu(x, y, items) {
        hideCtxMenu();
        ctxMenu = document.createElement("div");
        ctxMenu.className = "nav-ctx-menu";
        items.forEach(({ label, danger, action }) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `nav-ctx-item${danger ? " danger" : ""}`;
          btn.textContent = label;
          btn.addEventListener("click", () => { hideCtxMenu(); action(); });
          ctxMenu.appendChild(btn);
        });
        document.body.appendChild(ctxMenu);
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        ctxMenu.style.left = "0px";
        ctxMenu.style.top = "0px";
        const rect = ctxMenu.getBoundingClientRect();
        ctxMenu.style.left = `${Math.min(x, vw - rect.width - 8)}px`;
        ctxMenu.style.top = `${Math.min(y, vh - rect.height - 8)}px`;
      }

      function hideCtxMenu() {
        if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
      }

      document.addEventListener("click", hideCtxMenu);
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        hideCtxMenu();
        // close modals in reverse stacking order
        const pageEditModal = document.getElementById("page-edit-modal");
        const publishConfigModal = document.getElementById("publish-config-modal");
        const renameDialog = document.getElementById("rename-dialog");
        const versionEditorModal = document.getElementById("version-editor-modal");
        const versionListModal = document.getElementById("version-list-modal");
        if (publishConfigModal && !publishConfigModal.classList.contains("hidden")) {
          closePublishConfigModal();
        } else if (pageEditModal && !pageEditModal.classList.contains("hidden")) {
          pageEditModal.classList.add("hidden");
        } else if (renameDialog && !renameDialog.classList.contains("hidden")) {
          renameDialog.classList.add("hidden");
        } else if (versionEditorModal && !versionEditorModal.classList.contains("hidden")) {
          closeVersionModal();
        } else if (versionListModal && !versionListModal.classList.contains("hidden")) {
          closeVersionModal();
        } else if (state.isPageEditorOpen) {
          state.isPageEditorOpen = false;
          updateMainHeader();
          updateRequirementsState();
          postPageEditorPanelState(false);
        } else if (state.isRequirementsDrawerOpen) {
          state.isRequirementsDrawerOpen = false;
          updateMainHeader();
          updateRequirementsState();
          postRequirementPanelState(false);
        }
      });

      /* ===== Nav rendering ===== */
      function renderNavPageItem(page) {
        const active = state.activeMenu === page.id;
        const isReadOnlyVersion = isIterationPreview();
        return `
          <button class="nav-item ${active ? "active" : ""}" type="button"${isReadOnlyVersion ? "" : ` draggable="true"`}
            data-menu="${escapeHtml(page.id)}"${isReadOnlyVersion ? "" : ` data-ctx-page="${escapeHtml(page.id)}"`} data-page-id="${escapeHtml(page.id)}">
            <span class="nav-item-icon">${svg("file", active ? "var(--icon-default)" : "var(--icon-tertiary)", 16)}</span>
            <span class="nav-item-copy">
              <span class="nav-item-title">${escapeHtml(page.name)}</span>
            </span>
          </button>
        `;
      }

      function renderNav() {
        const navEl = document.getElementById("nav");
        const library = manifest.pageLibrary || { folders: [], rootPageIds: pages.map((p) => p.id), pageMeta: {} };
        const isReadOnlyVersion = isIterationPreview();

        const skillsActive = state.activeMenu === "zhangtu-skills";
        const designSystemActive = state.activeMenu === "zhangtu-design-system";
        const workflowActive = state.activeMenu === "zhangtu-workflow";
        const coreHtml = isReadOnlyVersion ? "" : `
          <button class="nav-item nav-item--skills ${workflowActive ? "active" : ""}" type="button" data-menu="zhangtu-workflow">
            <span class="nav-item-icon">${svg("workflow", workflowActive ? "var(--icon-default)" : "var(--icon-tertiary)", 14)}</span>
            <span class="nav-item-copy"><span class="nav-item-title">工作流</span></span>
          </button>
          <button class="nav-item nav-item--skills ${skillsActive ? "active" : ""}" type="button" data-menu="zhangtu-skills">
            <span class="nav-item-icon">${svg("sparkles", skillsActive ? "var(--icon-default)" : "var(--icon-tertiary)", 14)}</span>
            <span class="nav-item-copy"><span class="nav-item-title">技能</span></span>
          </button>
          <button class="nav-item nav-item--skills ${designSystemActive ? "active" : ""}" type="button" data-menu="zhangtu-design-system">
            <span class="nav-item-icon">${svg("palette", designSystemActive ? "var(--icon-default)" : "var(--icon-tertiary)", 14)}</span>
            <span class="nav-item-copy"><span class="nav-item-title">设计系统</span></span>
          </button>
        `;

        const sectionHeaderHtml = `
          <div class="nav-section-header">
            <span class="nav-section-title">${isReadOnlyVersion ? "版本页面" : "页面列表"}</span>
            <div style="display:${isReadOnlyVersion ? "none" : "flex"};align-items:center;gap:8px;">
              <button class="nav-add-btn" type="button" id="nav-add-folder" title="新建文件夹">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2Z"></path>
                  <line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line>
                </svg>
              </button>
            </div>
          </div>
        `;
        const sectionMetaHtml = isReadOnlyVersion
          ? `<div class="nav-section-meta">当前只展示该版本包含的页面。</div>`
          : `<div class="nav-section-meta">拖拽页面到文件夹可直接归类，拖回空白区可移到根目录。</div>`;

        const rootPages = (library.rootPageIds || []).map((id) => pageMap.get(id)).filter(Boolean);
        const rootPagesHtml = rootPages.map(renderNavPageItem).join("");

        const foldersHtml = (library.folders || []).map((folder) => {
          const isOpen = state.openFolders.has(folder.id);
          const folderPages = (folder.pageIds || []).map((id) => pageMap.get(id)).filter(Boolean);
          if (isReadOnlyVersion && folderPages.length === 0) return "";
          const folderPagesHtml = folderPages.map(renderNavPageItem).join("");
          const emptyHtml = `<div style="padding: var(--spacer-4) var(--spacer-10); font-size: var(--body-xs-font-size); color: var(--text-tertiary);">空文件夹</div>`;
          return `
            <div class="nav-folder" data-folder-id="${escapeHtml(folder.id)}" data-folder-name="${escapeHtml(folder.name)}">
              <button class="nav-folder-header" type="button"${isReadOnlyVersion ? "" : ` draggable="true" data-folder-drag-id="${escapeHtml(folder.id)}"`} data-folder-toggle="${escapeHtml(folder.id)}">
                <span class="nav-folder-toggle ${isOpen ? "open" : ""}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </span>
                <span class="nav-folder-name">${escapeHtml(folder.name)}</span>
              </button>
              <div class="nav-folder-body ${isOpen ? "" : "hidden"}">${folderPagesHtml || emptyHtml}</div>
            </div>
          `;
        }).join("");

        navEl.innerHTML = `${coreHtml}${sectionHeaderHtml}${sectionMetaHtml}<div class="nav-root-drop">${rootPagesHtml}</div>${foldersHtml}`;

        navEl.querySelectorAll("[data-menu]").forEach((button) => {
          button.addEventListener("click", () => setActiveMenu(button.getAttribute("data-menu")));
        });

        navEl.querySelectorAll("[data-folder-toggle]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const folderId = button.getAttribute("data-folder-toggle");
            if (state.openFolders.has(folderId)) {
              state.openFolders.delete(folderId);
            } else {
              state.openFolders.add(folderId);
            }
            renderNav();
          });
        });

        if (isReadOnlyVersion) {
          return;
        }

        navEl.querySelectorAll(".nav-folder-header").forEach((button) => {
          button.addEventListener("contextmenu", (event) => {
            event.preventDefault();
            const folderEl = button.closest(".nav-folder");
            const folderId = folderEl.getAttribute("data-folder-id");
            const folderName = folderEl.getAttribute("data-folder-name");
            showCtxMenu(event.clientX, event.clientY, [
              { label: "重命名文件夹", action: () => renameNavFolder(folderId, folderName) },
              { label: "删除文件夹", danger: true, action: () => deleteNavFolder(folderId) },
            ]);
          });
          // Double-click folder name for inline rename
          button.addEventListener("dblclick", (e) => {
            e.stopPropagation();
            const folderEl = button.closest(".nav-folder");
            const folderId = folderEl.getAttribute("data-folder-id");
            const nameEl = button.querySelector(".nav-folder-name");
            if (nameEl) startInlineFolderRename(nameEl, folderId);
          });
        });

        navEl.querySelectorAll("[data-ctx-page]").forEach((button) => {
          const pageId = button.getAttribute("data-ctx-page");

          button.addEventListener("contextmenu", (event) => {
            event.preventDefault();
            event.stopPropagation();
            const page = pageMap.get(pageId);
            const currentFolderId = library.pageMeta && library.pageMeta[pageId] ? library.pageMeta[pageId].folderId : null;
            showCtxMenu(event.clientX, event.clientY, [
              { label: "编辑页面", action: () => openPageEditModal(pageId) },
              { label: "重命名", action: () => renameNavPage(pageId, page ? page.name : pageId) },
              { label: "复制路径", action: () => {
                const path = page?.sourcePath || pageId;
                navigator.clipboard?.writeText(path).then(() => showToast("路径已复制")).catch(() => showToast(path));
              }},
              { label: "拷贝副本", action: () => duplicateNavPage(pageId) },
              ...(currentFolderId ? [{ label: "移出文件夹", action: () => movePageToFolder(pageId, null) }] : []),
              { label: "删除页面", danger: true, action: () => deleteNavPage(pageId) },
            ]);
          });

          // Double-click for inline rename
          button.addEventListener("dblclick", (e) => {
            e.stopPropagation();
            startInlinePageRename(button, pageId);
          });

          button.addEventListener("pointerdown", (event) => {
            beginPagePointerDrag(event, button, pageId);
          });

          // Drag source events (page)
          button.addEventListener("dragstart", (e) => {
            dragSource = { kind: "page", id: pageId };
            button.classList.add("drag-source");
            e.dataTransfer.setData("text/plain", `page:${pageId}`);
            e.dataTransfer.effectAllowed = "move";
          });
          button.addEventListener("dragend", () => {
            button.classList.remove("drag-source");
            dragSource = null;
            clearDragOverMarkers(navEl);
          });
        });

        // Folder drag source (folder header is draggable)
        navEl.querySelectorAll("[data-folder-drag-id]").forEach((headerEl) => {
          const folderId = headerEl.getAttribute("data-folder-drag-id");
          headerEl.addEventListener("dragstart", (e) => {
            dragSource = { kind: "folder", id: folderId };
            e.dataTransfer.setData("text/plain", `folder:${folderId}`);
            e.dataTransfer.effectAllowed = "move";
          });
          headerEl.addEventListener("dragend", () => {
            dragSource = null;
            clearDragOverMarkers(navEl);
          });
        });

        // Page items as drop targets (precise sibling insertion)
        navEl.querySelectorAll(".nav-item[data-page-id]").forEach((itemEl) => {
          const targetPageId = itemEl.getAttribute("data-page-id");
          itemEl.addEventListener("dragover", (e) => {
            if (!dragSource || dragSource.kind !== "page") return;
            if (dragSource.id === targetPageId) return;
            e.preventDefault(); e.stopPropagation();
            e.dataTransfer.dropEffect = "move";
            clearDragOverMarkers(navEl);
            const rect = itemEl.getBoundingClientRect();
            const mid = rect.top + rect.height / 2;
            const before = e.clientY < mid;
            showDragIndicator({
              top: before ? rect.top : rect.bottom,
              left: rect.left,
              width: rect.width,
            });
          });
          itemEl.addEventListener("drop", (e) => {
            if (!dragSource || dragSource.kind !== "page") return;
            if (dragSource.id === targetPageId) return;
            e.preventDefault(); e.stopPropagation();
            clearDragOverMarkers(navEl);
            const targetPage = pageMap.get(targetPageId);
            if (!targetPage) return;
            const targetFolderId = targetPage.folderId || null;
            const rect = itemEl.getBoundingClientRect();
            const before = e.clientY < rect.top + rect.height / 2;
            // Compute target index among siblings in the same container
            const container = itemEl.parentElement;
            const siblingItems = Array.from(container.querySelectorAll(":scope > .nav-item[data-page-id]"));
            let targetIndex = siblingItems.indexOf(itemEl);
            if (!before) targetIndex += 1;
            // If moving within same container, adjust for removal of source
            const sourcePage = pageMap.get(dragSource.id);
            const sourceFolderId = (sourcePage && sourcePage.folderId) || null;
            if (sourceFolderId === targetFolderId) {
              const sourceIdx = siblingItems.findIndex((el) => el.getAttribute("data-page-id") === dragSource.id);
              if (sourceIdx !== -1 && sourceIdx < targetIndex) targetIndex -= 1;
            }
            movePageToFolder(dragSource.id, targetFolderId, targetIndex);
          });
        });

        // Folder as drop target:
        //  - page drop onto folder header/body => move page into folder (append)
        //  - folder drop onto folder header => reorder folders (before/after)
        navEl.querySelectorAll(".nav-folder").forEach((folderEl) => {
          const folderId = folderEl.getAttribute("data-folder-id");
          const headerEl = folderEl.querySelector(".nav-folder-header");

          // Page -> folder (drop anywhere on folder when not precisely on a page item)
          folderEl.addEventListener("dragover", (e) => {
            if (!dragSource) return;
            if (dragSource.kind === "page") {
              // If over a page item, let the page-item handler take precedence (it stops propagation)
              if (e.target.closest(".nav-item[data-page-id]")) return;
              e.preventDefault(); e.stopPropagation();
              e.dataTransfer.dropEffect = "move";
              clearDragOverMarkers(navEl);
              folderEl.classList.add("drag-over");
              if (!state.openFolders.has(folderId) && !dragExpandTimer) {
                dragExpandTimer = window.setTimeout(() => {
                  dragExpandTimer = null;
                  state.openFolders.add(folderId);
                  renderNav();
                }, 320);
              }
            } else if (dragSource.kind === "folder" && dragSource.id !== folderId) {
              // Folder reorder: only when hovering the header
              if (!e.target.closest(".nav-folder-header")) return;
              e.preventDefault(); e.stopPropagation();
              e.dataTransfer.dropEffect = "move";
              clearDragOverMarkers(navEl);
              const rect = headerEl.getBoundingClientRect();
              const mid = rect.top + rect.height / 2;
              const before = e.clientY < mid;
              showDragIndicator({
                top: before ? rect.top : rect.bottom,
                left: rect.left,
                width: rect.width,
              });
            }
          });
          folderEl.addEventListener("drop", (e) => {
            if (!dragSource) return;
            if (dragSource.kind === "page") {
              if (e.target.closest(".nav-item[data-page-id]")) return;
              e.preventDefault(); e.stopPropagation();
              clearDragOverMarkers(navEl);
              movePageToFolder(dragSource.id, folderId);
            } else if (dragSource.kind === "folder" && dragSource.id !== folderId) {
              if (!e.target.closest(".nav-folder-header")) return;
              e.preventDefault(); e.stopPropagation();
              clearDragOverMarkers(navEl);
              const folderEls = Array.from(navEl.querySelectorAll(":scope > .nav-folder"));
              let targetIndex = folderEls.indexOf(folderEl);
              const rect = headerEl.getBoundingClientRect();
              const before = e.clientY < rect.top + rect.height / 2;
              if (!before) targetIndex += 1;
              const sourceIdx = folderEls.findIndex((el) => el.getAttribute("data-folder-id") === dragSource.id);
              if (sourceIdx !== -1 && sourceIdx < targetIndex) targetIndex -= 1;
              moveFolderTo(dragSource.id, targetIndex);
            }
          });
        });

        // Root drop zone: pages (move out of folder / reorder at root) + folders (reorder at root tail)
        const rootDrop = navEl.querySelector(".nav-root-drop");
        if (rootDrop) {
          rootDrop.addEventListener("dragover", (e) => {
            if (!dragSource) return;
            // If over a page item or folder, let their handlers win
            if (e.target.closest(".nav-item[data-page-id], .nav-folder")) return;
            e.preventDefault(); e.stopPropagation();
            e.dataTransfer.dropEffect = "move";
            clearDragOverMarkers(navEl);
            rootDrop.classList.add("drag-over");
            const rect = rootDrop.getBoundingClientRect();
            showDragIndicator({ top: rect.bottom - 2, left: rect.left, width: rect.width });
          });
          rootDrop.addEventListener("dragleave", (e) => {
            if (!rootDrop.contains(e.relatedTarget)) {
              rootDrop.classList.remove("drag-over");
              hideDragIndicator();
            }
          });
          rootDrop.addEventListener("drop", (e) => {
            if (!dragSource) return;
            if (e.target.closest(".nav-item[data-page-id], .nav-folder")) return;
            e.preventDefault(); e.stopPropagation();
            clearDragOverMarkers(navEl);
            if (dragSource.kind === "page") {
              movePageToFolder(dragSource.id, null);
            } else if (dragSource.kind === "folder") {
              // Move folder to end of root list. After removal of source, the list has
              // (N-1) items, so index = N-1 places it at the tail.
              const folderEls = Array.from(navEl.querySelectorAll(":scope > .nav-folder"));
              moveFolderTo(dragSource.id, folderEls.length - 1);
            }
          });
        }

        const addFolderBtn = document.getElementById("nav-add-folder");
        if (addFolderBtn) {
          addFolderBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            createNavFolder();
          });
        }
      }

      function updateMainHeader() {
        const headerEl = document.getElementById("main-header");
        const sidebarToggle = document.getElementById("sidebar-toggle");
        const deviceSwitch = document.getElementById("device-switch");
        const requirementsToggle = document.getElementById("requirements-toggle");
        const pageEditorToggle = document.getElementById("page-editor-toggle");
        const refreshPage = document.getElementById("refresh-page");
        const versionButton = document.getElementById("version-button");

        sidebarToggle.classList.remove("with-label");
        sidebarToggle.innerHTML = svg("columns", "var(--icon-secondary)", 16);
        sidebarToggle.setAttribute("aria-label", "展开/收起侧边栏");
        sidebarToggle.title = "展开/收起侧边栏";
        updateDeviceSwitch();
        requirementsToggle.innerHTML = `${svg("notes", "var(--icon-secondary)", 14)} <span>页面备注</span>`;
        requirementsToggle.classList.remove("icon-only");
        requirementsToggle.setAttribute("aria-label", "页面备注");
        pageEditorToggle.innerHTML = `${svg("sparkles", "var(--icon-secondary)", 14)} <span>编辑页面</span>`;
        pageEditorToggle.classList.remove("icon-only");
        pageEditorToggle.setAttribute("aria-label", "编辑页面");
        refreshPage.innerHTML = `${svg("refresh", "var(--icon-secondary)", 14)} <span>刷新</span>`;
        versionButton.innerHTML = `${svg("layers", "var(--icon-secondary)", 14)} <span>版本管理</span>`;
        versionButton.classList.remove("hidden");
        deviceSwitch.classList.remove("hidden");

        if (isIterationPreview()) {
          headerEl.classList.remove("hidden");
          sidebarToggle.classList.add("with-label");
          sidebarToggle.innerHTML = `${svg("arrowLeft", "currentColor", 16)} <span>返回项目</span>`;
          sidebarToggle.setAttribute("aria-label", "返回项目预览");
          sidebarToggle.title = "返回项目预览";
          deviceSwitch.classList.add("hidden");
          const versionBadge = document.getElementById("version-preview-badge");
          const versionNameEl = document.getElementById("version-preview-name");
          const versionTagEl = document.getElementById("version-preview-tag");
          if (versionBadge && versionNameEl) {
            versionNameEl.textContent = getIterationDisplayTitle();
            if (versionTagEl) versionTagEl.textContent = manifest.scope?.description ? manifest.scope.description : "版本预览";
            versionBadge.classList.add("is-visible");
          }
          requirementsToggle.innerHTML = `${svg("edit", "var(--icon-secondary)", 14)} <span>编辑版本</span>`;
          requirementsToggle.classList.remove("hidden", "is-active");
          requirementsToggle.setAttribute("aria-label", "编辑当前版本");
          const shareUrl = getPublishedShareUrl(manifest.scope);
          pageEditorToggle.innerHTML = shareUrl
            ? `${svg("upload", "var(--icon-secondary)", 14)} <span>更新原型</span>`
            : `${svg("upload", "var(--icon-secondary)", 14)} <span>发布</span>`;
          pageEditorToggle.classList.remove("hidden", "is-active");
          pageEditorToggle.setAttribute("aria-label", shareUrl ? "更新当前线上版本原型" : "发布当前版本");
          pageEditorToggle.title = shareUrl ? "重新上传当前本地原型，分享链接保持不变" : "发布当前版本";
          refreshPage.innerHTML = `${svg("trash", "var(--icon-secondary)", 14)} <span>删除</span>`;
          refreshPage.classList.remove("hidden", "is-active");
          refreshPage.setAttribute("aria-label", "删除当前版本");
          if (shareUrl) {
            versionButton.innerHTML = `${svg("externalLink", "var(--icon-secondary)", 14)} <span>打开链接</span>`;
            versionButton.classList.remove("hidden", "is-active");
            versionButton.setAttribute("aria-label", "打开已发布版本链接");
            versionButton.title = shareUrl;
          } else {
            versionButton.classList.add("hidden");
          }
          return;
        }
        const versionBadge = document.getElementById("version-preview-badge");
        if (versionBadge) versionBadge.classList.remove("is-visible");

        if (state.activeMenu === "zhangtu-skills" || state.activeMenu === "zhangtu-design-system" || state.activeMenu === "zhangtu-workflow") {
          headerEl.classList.add("hidden");
          return;
        }

        headerEl.classList.remove("hidden");
        const page = getActivePage();
        const hasRequirements = Boolean(page && getRequirementsForPage(page).length);
        pageEditorToggle.classList.toggle("hidden", !page);
        pageEditorToggle.classList.toggle("is-active", state.isPageEditorOpen && Boolean(page));
        requirementsToggle.classList.toggle("hidden", !hasRequirements);
        requirementsToggle.classList.toggle("is-active", state.isRequirementsDrawerOpen && hasRequirements);
      }

      function normalizeRequirementAnnotation(item, index) {
        return {
          id: String(item && item.id || `req-${index + 1}`),
          number: String(item ? (item.number ?? item.order ?? item.id ?? (index + 1)) : (index + 1)),
          order: Number.isFinite(Number(item && item.order)) ? Number(item.order) : index + 1,
          title: String(item && item.title || `需求 ${index + 1}`),
          anchorId: String(item && (item.anchorId || item.id) || `req-${index + 1}`),
          bodyMarkdown: typeof item?.bodyMarkdown === "string" ? item.bodyMarkdown : "",
          category: typeof item?.category === "string" ? item.category : "",
          color: typeof item?.color === "string" ? item.color : "",
          ref: typeof item?.ref === "string" ? item.ref : "",
        };
      }

      function normalizeRequirementAnnotations(items) {
        return Array.isArray(items)
          ? items.map(normalizeRequirementAnnotation).sort((a, b) => a.order - b.order)
          : [];
      }

      function renderRequirementMarkdown(markdown) {
        return escapeHtml(
          String(markdown || "")
            .replace(/^#{1,6}\s+/gm, "")
            .replace(/^[-*]\s+/gm, "")
            .replace(/^>\s?/gm, "")
            .replace(/\n+/g, "\n")
            .trim()
            .split("\n")
            .filter(Boolean)
            .slice(0, 4)
            .join("\n"),
        );
      }

      function inlineRequirementMarkdown(value) {
        return escapeHtml(String(value || ""))
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.+?)\*/g, "<em>$1</em>")
          .replace(/`(.+?)`/g, "<code>$1</code>");
      }

      function renderRequirementDetail(markdown) {
        const lines = String(markdown || "").replace(/\r\n/g, "\n").split("\n");
        let html = "";
        let inList = false;
        let inTable = false;
        let tableRows = [];

        const flushList = () => {
          if (inList) { html += "</ul>"; inList = false; }
        };

        const flushTable = () => {
          if (!inTable) return;
          html += '<div class="requirement-table-wrap"><table class="requirement-table">';
          if (tableRows.length > 0) {
            html += `<thead><tr>${tableRows[0].map((c) => `<th>${inlineRequirementMarkdown(c)}</th>`).join("")}</tr></thead>`;
            html += "<tbody>";
            for (let i = 1; i < tableRows.length; i++) {
              if (tableRows[i].every((c) => /^\s*:?-+:?\s*$/.test(c))) continue;
              html += `<tr>${tableRows[i].map((c) => `<td>${inlineRequirementMarkdown(c)}</td>`).join("")}</tr>`;
            }
            html += "</tbody>";
          }
          html += "</table></div>";
          inTable = false;
          tableRows = [];
        };

        for (const rawLine of lines) {
          const line = rawLine.trimEnd();
          const trimmed = line.trim();

          if (trimmed.startsWith("|") && trimmed.endsWith("|")) {
            flushList();
            inTable = true;
            tableRows.push(trimmed.slice(1, -1).split("|").map((c) => c.trim()));
            continue;
          }

          flushTable();

          if (!trimmed) { flushList(); continue; }

          if (/^---+$/.test(trimmed)) {
            flushList();
            html += "<hr />";
            continue;
          }

          if (/^#{1,6}\s+/.test(trimmed)) {
            flushList();
            const level = Math.min((trimmed.match(/^#+/)?.[0].length ?? 1) + 1, 6);
            html += `<h${level}>${inlineRequirementMarkdown(trimmed.replace(/^#{1,6}\s+/, ""))}</h${level}>`;
            continue;
          }

          if (/^[-*]\s+/.test(trimmed)) {
            if (!inList) { html += "<ul>"; inList = true; }
            html += `<li>${inlineRequirementMarkdown(trimmed.replace(/^[-*]\s+/, ""))}</li>`;
            continue;
          }

          if (/^>\s?/.test(trimmed)) {
            flushList();
            html += `<blockquote>${inlineRequirementMarkdown(trimmed.replace(/^>\s?/, ""))}</blockquote>`;
            continue;
          }

          flushList();
          html += `<p>${inlineRequirementMarkdown(trimmed)}</p>`;
        }

        flushList();
        flushTable();
        return html || `<p>${escapeHtml("当前备注暂无详细内容。")}</p>`;
      }

      function renderRequirementsSidebar(page) {

                    <input type="color" id="requirements-theme-color" value="${escapeHtml(state.annotationThemeColor)}" />
                  </label>
                  <button class="tool-button" type="button" id="requirements-visibility-toggle"
                    title="${state.annotationMarkersVisible ? "隐藏页面角标" : "显示页面角标"}">
                    ${state.annotationMarkersVisible ? "隐藏角标" : "显示角标"}
                  </button>
                  <button class="tool-button" type="button" id="requirements-sidebar-close">关闭</button>
                </div>
              </header>
              <div class="requirements-search-row">
                <input id="requirements-search" class="requirements-search-input" type="text"
                  placeholder="搜索备注标题、分类、内容…"
                  value="${escapeHtml(state.requirementsQuery || "")}" autocomplete="off" />
              </div>
              <div class="requirements-list">
                ${visible.length ? cards : emptyMsg}
